<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#100F19"/>

  <!-- Bisel exterior tipo reloj/brújula -->
  <circle cx="512" cy="512" r="440" fill="none" stroke="#3a3a46" stroke-width="10"/>
  <circle cx="512" cy="512" r="404" fill="none" stroke="#6c6c7a" stroke-width="18"/>

  <!-- Marcas del bisel: 12 mayores + 12 menores -->
  <g stroke="#c9c9d4" stroke-linecap="round">
    <g id="ticks-major" stroke-width="16">
      <line x1="512" y1="82" x2="512" y2="132"/>
    </g>
    <g id="ticks-minor" stroke-width="9">
      <line x1="512" y1="90" x2="512" y2="122"/>
    </g>
  </g>

  <g stroke="#c9c9d4" stroke-linecap="round">
    <!-- 12 marcas mayores cada 30 grados -->
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(0 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(30 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(60 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(90 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(120 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(150 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(180 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(210 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(240 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(270 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(300 512 512)"/>
    <line x1="512" y1="86" x2="512" y2="140" stroke-width="16" transform="rotate(330 512 512)"/>

    <!-- 12 marcas menores intercaladas cada 30 grados (a +15) -->
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(15 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(45 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(75 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(105 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(135 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(165 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(195 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(225 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(255 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(285 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(315 512 512)"/>
    <line x1="512" y1="94" x2="512" y2="128" stroke-width="9" opacity="0.75" transform="rotate(345 512 512)"/>
  </g>

  <!-- Marca interior: trazo ascendente con dos picos, mucho más grueso -->
  <polyline points="150,505 330,432 545,150" fill="none" stroke="#e7e7ee"
            stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="290,432 265,285" fill="none" stroke="#e7e7ee"
            stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="330" y1="432" x2="770" y2="270" stroke="#e7e7ee"
        stroke-width="34" stroke-linecap="round"/>
</svg>
