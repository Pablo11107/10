<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Communities - Chats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  >
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #100F19;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      animation: pageFadeIn 0.4s ease forwards;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      background-color: #00000A;
      text-align: center;
      padding: 1.75rem 1rem 1.1rem;
      flex-shrink: 0;
    }
    .header h1 { font-size: 2.4rem; font-weight: 700; margin: 0; }
    .header h1 a { text-decoration: none; color: #fff; transition: color 0.2s; }
    .header h1 a:hover { color: #ccc; }
    .header .page-tagline { font-size: 0.85rem; color: #777; margin-top: 0.25rem; letter-spacing: 0.02em; }

    .main-container { flex: 1; display: flex; overflow: hidden; }

    .sidebar {
      width: 270px;
      background-color: #171620;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 0;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.05);
    }
    .sidebar h2 {
      font-size: 0.75rem; font-weight: 700; color: #777;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 0 1.25rem; margin-bottom: 0.75rem;
    }
    .chat-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.7rem 1.25rem; cursor: pointer;
      transition: background-color 0.2s;
    }
    .chat-item:hover { background-color: #201F28; }
    .chat-item.active { background-color: #2F2E37; }
    .chat-item .chat-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background-color: #3F3D46; background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem; color: #F5F5F7; flex-shrink: 0;
    }
    .chat-item-text { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
    .chat-item-text span.chat-name {
      font-size: 0.92rem; color: #eee; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chat-item-text span.chat-last {
      font-size: 0.75rem; color: #777;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .sidebar-divider { height: 1px; background-color: rgba(255,255,255,0.06); margin: 0.6rem 1.25rem; }
    .sidebar-empty { padding: 0.5rem 1.25rem; color: #666; font-size: 0.82rem; line-height: 1.4; }

    .new-chat-btn {
      margin: 0.4rem 1.25rem 0;
      padding: 0.65rem; text-align: center;
      background-color: #2F2E37; color: #F5F5F7;
      border-radius: 12px; cursor: pointer;
      font-weight: 600; font-size: 0.85rem;
      transition: background-color 0.2s;
    }
    .new-chat-btn:hover { background-color: #3F3D46; }

    .chat-area {
      flex: 1; background-color: #100F19;
      display: flex; flex-direction: column;
      justify-content: space-between; overflow: hidden;
    }

    .chat-header {
      background-color: #171620;
      padding: 0.9rem 1.25rem;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chat-header-left { display: flex; align-items: center; gap: 0.9rem; }
    .chat-header-left .chat-avatar-lg {
      width: 46px; height: 46px; border-radius: 50%;
      background-color: #3F3D46; background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #F5F5F7; flex-shrink: 0;
    }
    .chat-header-left-text { display: flex; flex-direction: column; }
    .chat-header-left h2 { font-size: 1.1rem; font-weight: 700; margin: 0; }
    .chat-header-left .member-count { font-size: 0.72rem; color: #777; }

    .chat-header-right { display: flex; align-items: center; gap: 0.5rem; }
    .chat-header-right button {
      background-color: #2F2E37; border: none; color: #F5F5F7;
      font-weight: 600; font-size: 0.8rem; border-radius: 20px;
      padding: 0.5rem 0.9rem; cursor: pointer; transition: background-color 0.2s;
    }
    .chat-header-right button:hover { background-color: #3F3D46; }
    .chat-header-right button:disabled { opacity: 0.4; cursor: default; }

    .messages { flex: 1; padding: 1.25rem; overflow-y: auto; display: flex; flex-direction: column; }
    .empty-chat {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: #666; gap: 0.6rem; text-align: center;
    }
    .empty-chat .icon { font-size: 2.2rem; opacity: 0.5; display: inline-block; }
    .empty-chat .icon img { width: 2.2rem; height: 2.2rem; object-fit: contain; display: block; }
    .empty-chat p { font-size: 0.9rem; max-width: 280px; }

    .message-row { display: flex; flex-direction: column; margin-bottom: 0.8rem; }
    .message-row.mine { align-items: flex-end; }
    .message-row.other { align-items: flex-start; }
    .message-sender { font-size: 0.7rem; color: #777; margin-bottom: 0.2rem; padding: 0 0.3rem; }
    .message {
      max-width: 65%; padding: 0.7rem 0.95rem; border-radius: 16px;
      font-size: 0.92rem; line-height: 1.4; white-space: pre-wrap;
    }
    .message.other { background-color: #201F28; color: #eee; border-bottom-left-radius: 4px; }
    .message.mine { background-color: #F5F5F7; color: #100F19; border-bottom-right-radius: 4px; }

    .chat-footer {
      background-color: #171620; padding: 0.9rem 1.25rem; flex-shrink: 0;
      display: flex; gap: 0.6rem; border-top: 1px solid rgba(255,255,255,0.05);
    }
    .chat-footer input {
      flex: 1; border: 2px solid #2F2E37; border-radius: 20px;
      padding: 0.65rem 1rem; outline: none; font-size: 0.95rem;
      background-color: #100F19; color: #fff; font-family: inherit;
      transition: border-color 0.2s;
    }
    .chat-footer input:focus { border-color: #F5F5F7; }
    .chat-footer input:disabled { opacity: 0.5; }
    .chat-footer button {
      background-color: #F5F5F7; border: none; color: #100F19; font-weight: 700;
      border-radius: 20px; padding: 0 1.4rem; cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.02em;
    }
    .chat-footer button:hover { background-color: #E3E3E8; }
    .chat-footer button:disabled { opacity: 0.4; cursor: default; }

    .footer { background-color: #00000A; padding: 1rem 0; text-align: center; flex-shrink: 0; }
    .bottom-nav { display: flex; justify-content: space-around; align-items: center; }
    .nav-item a {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: #fff;
      padding: 0.3rem 0.9rem; border-radius: 12px;
      transition: background-color 0.2s, opacity 0.2s;
    }
    .nav-item a:hover { opacity: 0.85; }
    .nav-item.active a { background-color: rgba(255,255,255,0.06); }
    .nav-item span { font-size: 0.85rem; margin-top: 0.2rem; }
    .image { width: 40px; height: 40px; overflow: hidden; border-radius: 50%; background-color: #201F28; margin-bottom: 0.3rem; }
    .image img { width: 100%; height: 100%; object-fit: cover; }
    .image-icon { display: flex; justify-content: center; align-items: center; }
    .image-icon svg { width: 50%; height: 50%; color: #777; transition: color 0.2s; }
    .nav-item.active .image-icon svg { color: #D4AF6D; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background-color: #171620; }
    ::-webkit-scrollbar-thumb { background-color: #3F3D46; border-radius: 8px; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; justify-content: center; align-items: center;
      z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal {
      position: relative;
      background: linear-gradient(180deg, #2F2E37, #100F19);
      color: #fff; padding: 2rem 1.75rem 1.75rem; border-radius: 20px;
      width: 300px; max-width: 90%;
      display: flex; flex-direction: column; gap: 0.9rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08);
      transform: scale(0.9) translateY(8px);
      transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal h3 { font-weight: 600; font-size: 1.1rem; text-align: center; }
    .modal label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-top: 0.2rem; }
    .modal input[type="email"], .modal input[type="file"], .modal input[type="text"] {
      width: 100%; border: 2px solid #2F2E37; border-radius: 10px;
      padding: 0.6rem 0.8rem; outline: none; background-color: #100F19; color: #fff;
      font-family: inherit; font-size: 0.95rem; transition: border-color 0.2s;
    }
    .modal input:focus { border-color: #F5F5F7; }
    .modal button {
      background-color: #F5F5F7; border: none; color: #100F19; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.02em; font-size: 0.85rem;
      border-radius: 12px; padding: 0.75rem 1rem; cursor: pointer;
      transition: background-color 0.2s, transform 0.15s;
    }
    .modal button:hover { background-color: #E3E3E8; }
    .modal button:active { transform: scale(0.97); }
    .modal button:disabled { opacity: 0.5; cursor: default; }
    .modal .close-btn {
      position: absolute; top: 0.75rem; right: 0.75rem; width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background-color: rgba(255,255,255,0.08); color: #ccc; font-size: 0.85rem;
      border-radius: 50%; cursor: pointer; transition: background-color 0.2s, color 0.2s;
      margin: 0;
    }
    .modal .close-btn:hover { background-color: rgba(255,255,255,0.18); color: #fff; }

    .focus-toast {
      position: fixed; bottom: 30px; left: 50%; transform: translate(-50%, 16px);
      background-color: #201F28; color: #F5F5F7; padding: 0.8rem 1.4rem; border-radius: 14px;
      font-size: 0.9rem; font-weight: 600; text-align: center; max-width: 85%;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.07);
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease; z-index: 1200;
    }
    .focus-toast.show { opacity: 1; transform: translate(-50%, 0); }

    /* ===== Mejoras estéticas e interactivas ===== */
    .chat-item { position: relative; }
    .chat-item.active::before {
      content: ""; position: absolute; left: 0; top: 18%; bottom: 18%;
      width: 3px; border-radius: 0 3px 3px 0; background: #D4AF6D;
    }
    .chat-item .chat-avatar, .chat-header-left .chat-avatar-lg {
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }
    .message-row { animation: msgIn 0.22s cubic-bezier(0.2, 0.8, 0.3, 1) both; }
    @keyframes msgIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: none; } }
    .message-time { font-size: 0.62rem; color: #666; margin-top: 0.22rem; padding: 0 0.35rem; }
    .message.mine + .message-time, .message-row.mine .message-time { text-align: right; }
    .day-divider {
      align-self: center; font-size: 0.68rem; font-weight: 600; color: #888;
      background: rgba(255,255,255,0.05); border-radius: 999px;
      padding: 0.28rem 0.85rem; margin: 0.9rem 0 1rem; letter-spacing: 0.04em;
    }
    .chat-footer button { transition: background-color 0.2s, opacity 0.2s, transform 0.12s; }
    .chat-footer button:active { transform: scale(0.94); }
    .empty-chat .icon { position: relative; }
    .empty-chat .icon::before, .empty-chat .icon::after {
      content: ""; position: absolute; inset: -14px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.10); animation: emptyPulse 2.6s ease-out infinite;
    }
    .empty-chat .icon::after { animation-delay: 1.3s; }
    @keyframes emptyPulse { 0% { transform: scale(0.6); opacity: 0.9; } 100% { transform: scale(1.5); opacity: 0; } }

    .back-btn {
      display: none; background: none; border: none; color: #F5F5F7;
      width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: background-color 0.2s;
    }
    .back-btn:hover { background-color: rgba(255,255,255,0.08); }
    .back-btn svg { width: 20px; height: 20px; }

    /* ===== Móvil: patrón de dos vistas (lista ↔ conversación) ===== */
    @media (max-width: 768px) {
      .header { padding: 1.2rem 1rem 0.8rem; }
      .header h1 { font-size: 1.8rem; }
      .header .page-tagline { font-size: 0.75rem; }
      .main-container { position: relative; }
      .sidebar {
        position: absolute; inset: 0; width: 100%; z-index: 5;
        border-right: none;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
      }
      body.chat-open .sidebar { transform: translateX(-12%); opacity: 0; pointer-events: none; }
      .chat-area { width: 100%; }
      .back-btn { display: flex; }
      .chat-header { padding: 0.7rem 0.8rem; }
      .chat-header-left { gap: 0.55rem; min-width: 0; }
      .chat-header-left h2 { font-size: 0.98rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .chat-header-left .chat-avatar-lg { width: 38px; height: 38px; }
      .chat-header-right button { font-size: 0.72rem; padding: 0.45rem 0.7rem; }
      .messages { padding: 1rem 0.8rem; }
      .message { max-width: 80%; }
      .chat-footer { padding: 0.7rem 0.8rem calc(0.7rem + env(safe-area-inset-bottom)); }
      .nav-item span { font-size: 0.72rem; }
      .image { width: 34px; height: 34px; }
    }
  </style>
</head>
<body>

  <header class="header">
    <h1><a href="index.html">Focus.</a></h1>
    <div class="page-tagline">Communities — real chats with real FOCUS members</div>
  </header>

  <div class="main-container">
    <aside class="sidebar" id="sidebar">
      <h2>Chats</h2>
      <div id="chatList">
        <p class="sidebar-empty">Loading your chats...</p>
      </div>
      <div class="sidebar-divider"></div>
      <div class="new-chat-btn" id="newChatBtn">+ New Chat</div>
    </aside>

    <section class="chat-area">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="back-btn" id="backToChatsBtn" aria-label="Volver a chats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
          <div class="chat-avatar-lg" id="chatAvatar">·</div>
          <div class="chat-header-left-text">
            <h2 id="chatTitle">Select a chat</h2>
            <span class="member-count" id="chatMemberCount"></span>
          </div>
        </div>
        <div class="chat-header-right">
          <button id="inviteBtn" disabled>Invite</button>
          <button id="changeAvatarBtn" disabled>Change Photo</button>
        </div>
      </div>

      <div class="messages" id="messagesContainer">
        <div class="empty-chat" id="emptyChatState">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7a2.5 2.5 0 0 1-2.5 2.5H10l-4.5 4v-4H6.5A2.5 2.5 0 0 1 4 13.5v-7Z"/></svg></span>
          <p>Pick a chat from the left to start talking, or create a new one.</p>
        </div>
      </div>

      <div class="chat-footer">
        <input type="text" id="messageInput" placeholder="Write your message..." disabled />
        <button id="sendBtn" disabled>Send</button>
      </div>
    </section>
  </div>

  <!-- Navegación inferior: dock (dock-nav.js se auto-monta) -->
  <div id="dockNav"></div>

  <!-- Modal para crear chat -->
  <div class="modal-overlay" id="newChatModal">
    <div class="modal">
      <div class="close-btn" id="closeNewChatModal">✕</div>
      <h3>Create a new Chat</h3>
      <label for="newChatName">Chat Name</label>
      <input type="text" id="newChatName" placeholder="My new group...">
      <button id="createChatBtn">Create Chat</button>
    </div>
  </div>

  <!-- Modal para invitar gente -->
  <div class="modal-overlay" id="inviteModal">
    <div class="modal">
      <div class="close-btn" id="closeInviteModal">✕</div>
      <h3>Invite People</h3>
      <label for="inviteEmail">Email of a FOCUS user</label>
      <input type="email" id="inviteEmail" placeholder="someone@example.com">
      <button id="sendInviteBtn">Send Invite</button>
    </div>
  </div>

  <!-- Modal para cambiar foto de perfil del chat -->
  <div class="modal-overlay" id="changeAvatarModal">
    <div class="modal">
      <div class="close-btn" id="closeAvatarModal">✕</div>
      <h3>Change Chat Photo</h3>
      <label for="newAvatarFile">Select Image</label>
      <input type="file" id="newAvatarFile" accept="image/*">
      <button id="saveAvatarBtn">Save Avatar</button>
    </div>
  </div>

  <div class="focus-toast" id="focusToast"></div>

  <script type="module">
    import {
      requireAuth, loadUserDoc, resizeImageFile,
      createChat, listenToUserChats, findUserByEmail, inviteToChat, updateChatAvatar,
      listenToMessages, sendMessage
    } from "./firebase-init.js";

    const user = await requireAuth();
    const uid = user.uid;

    // Set de iconos FOCUS: linea fina dorada, coherente con la marca
    const FOCUS_ICONS = {
      '231b': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M6.5 3.5h11M6.5 20.5h11M8 3.5v2.8c0 2 1.5 3.2 4 5.7-2.5 2.5-4 3.7-4 5.7v2.8M16 3.5v2.8c0 2-1.5 3.2-4 5.7 2.5 2.5 4 3.7 4 5.7v2.8"/></svg>`,
      '270d': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M4 20l1-4L16.5 4.5a2.12 2.12 0 0 1 3 3L8 19l-4 1Z"/><path d="M14.5 6.5l3 3"/></svg>`
    };
    function twemojiImg(code, alt = "") { return FOCUS_ICONS[code] || ''; }
    const savedData = await loadUserDoc(uid);
    const profileInfo = savedData.profileInfo || {};
    const myName = profileInfo.userName || profileInfo.realName || "FocusUser";

    const focusToast = document.getElementById('focusToast');
    let toastTimer;
    function showToast(message) {
      focusToast.textContent = message;
      focusToast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => focusToast.classList.remove('show'), 2400);
    }
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    const chatList           = document.getElementById('chatList');
    const chatTitle          = document.getElementById('chatTitle');
    const chatAvatar         = document.getElementById('chatAvatar');
    const chatMemberCount    = document.getElementById('chatMemberCount');
    const messagesContainer  = document.getElementById('messagesContainer');
    const messageInput       = document.getElementById('messageInput');
    const sendBtn             = document.getElementById('sendBtn');
    const newChatBtn         = document.getElementById('newChatBtn');
    const inviteBtn          = document.getElementById('inviteBtn');
    const changeAvatarBtn    = document.getElementById('changeAvatarBtn');

    const newChatModal    = document.getElementById('newChatModal');
    const closeNewChatModal = document.getElementById('closeNewChatModal');
    const newChatName     = document.getElementById('newChatName');
    const createChatBtn   = document.getElementById('createChatBtn');

    const inviteModal      = document.getElementById('inviteModal');
    const closeInviteModal = document.getElementById('closeInviteModal');
    const inviteEmail      = document.getElementById('inviteEmail');
    const sendInviteBtn    = document.getElementById('sendInviteBtn');

    const changeAvatarModal = document.getElementById('changeAvatarModal');
    const closeAvatarModal  = document.getElementById('closeAvatarModal');
    const newAvatarFile     = document.getElementById('newAvatarFile');
    const saveAvatarBtn     = document.getElementById('saveAvatarBtn');

    let myChats = [];
    let currentChatId = null;
    let unsubscribeMessages = null;

    function openModal(modal) { modal.classList.add('open'); }
    function closeModal(modal) { modal.classList.remove('open'); }

    // ---- Lista de chats en tiempo real ----
    listenToUserChats(uid, (chats) => {
      myChats = chats;
      renderChatList();
      // Si el chat abierto cambió de nombre/avatar en otro dispositivo, refrescamos su cabecera
      if (currentChatId) {
        const updated = chats.find(c => c.id === currentChatId);
        if (updated) renderChatHeader(updated);
      }
    });

    // Gradiente estable por nombre de chat (cuando no hay foto)
    const AVATAR_HUES = [36, 210, 152, 268, 4, 190, 320, 96];
    function avatarStyle(chat) {
      if (chat.avatar) return `background-image:url(${chat.avatar})`;
      let h = 0;
      for (const ch of (chat.name || '?')) h = (h * 31 + ch.charCodeAt(0)) % 997;
      const hue = AVATAR_HUES[h % AVATAR_HUES.length];
      return `background:linear-gradient(135deg, hsl(${hue},38%,34%), hsl(${(hue + 40) % 360},30%,20%))`;
    }

    function renderChatList() {
      if (myChats.length === 0) {
        chatList.innerHTML = `<p class="sidebar-empty">You're not in any chats yet. Create one, or ask a friend to invite you by your FOCUS email.</p>`;
        return;
      }
      chatList.innerHTML = myChats.map(chat => {
        const initial = (chat.name || "?").charAt(0).toUpperCase();
        return `
          <div class="chat-item ${chat.id === currentChatId ? 'active' : ''}" data-chat-id="${chat.id}">
            <div class="chat-avatar" style="${avatarStyle(chat)}">
              ${chat.avatar ? '' : initial}
            </div>
            <div class="chat-item-text">
              <span class="chat-name">${escapeHtml(chat.name)}</span>
              <span class="chat-last">${escapeHtml(chat.lastMessage || 'No messages yet')}</span>
            </div>
          </div>`;
      }).join('');
    }

    chatList.addEventListener('click', (e) => {
      const item = e.target.closest('.chat-item');
      if (!item) return;
      openChat(item.dataset.chatId);
    });

    function renderChatHeader(chat) {
      const initial = (chat.name || "?").charAt(0).toUpperCase();
      chatTitle.textContent = chat.name;
      chatAvatar.style.cssText = avatarStyle(chat);
      chatAvatar.textContent = chat.avatar ? "" : initial;
      chatMemberCount.textContent = `${(chat.members || []).length} member${(chat.members || []).length === 1 ? '' : 's'}`;
    }

    function openChat(chatId) {
      currentChatId = chatId;
      const chat = myChats.find(c => c.id === chatId);
      if (!chat) return;

      document.body.classList.add('chat-open'); // móvil: pasar a la vista de conversación

      renderChatHeader(chat);
      renderChatList();

      messageInput.disabled = false;
      sendBtn.disabled = false;
      inviteBtn.disabled = false;
      changeAvatarBtn.disabled = false;

      if (unsubscribeMessages) unsubscribeMessages();
      messagesContainer.innerHTML = `<div class="empty-chat"><span class="icon">${twemojiImg("231b")}</span><p>Loading messages...</p></div>`;

      unsubscribeMessages = listenToMessages(chatId, (messages) => {
        renderMessages(messages);
      });
    }

    function msgDate(msg) {
      try { return msg.createdAt && msg.createdAt.toDate ? msg.createdAt.toDate() : null; }
      catch { return null; }
    }
    function dayLabel(d) {
      const today = new Date(); today.setHours(0,0,0,0);
      const day = new Date(d); day.setHours(0,0,0,0);
      const diff = Math.round((today - day) / 864e5);
      if (diff === 0) return 'Hoy';
      if (diff === 1) return 'Ayer';
      return d.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    function renderMessages(messages) {
      if (messages.length === 0) {
        messagesContainer.innerHTML = `<div class="empty-chat"><span class="icon">${twemojiImg("270d")}</span><p>No messages yet. Say hello!</p></div>`;
        return;
      }
      let lastDayKey = null;
      messagesContainer.innerHTML = messages.map(msg => {
        const mine = msg.senderId === uid;
        const d = msgDate(msg);
        let divider = '';
        if (d) {
          const key = d.toDateString();
          if (key !== lastDayKey) { divider = `<div class="day-divider">${dayLabel(d)}</div>`; lastDayKey = key; }
        }
        const time = d ? `<span class="message-time">${d.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })}</span>` : '';
        return `
          ${divider}
          <div class="message-row ${mine ? 'mine' : 'other'}">
            ${!mine ? `<span class="message-sender">${escapeHtml(msg.senderName || 'FocusUser')}</span>` : ''}
            <div class="message ${mine ? 'mine' : 'other'}">${escapeHtml(msg.text)}</div>
            ${time}
          </div>`;
      }).join('');
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // Volver a la lista (móvil)
    document.getElementById('backToChatsBtn').addEventListener('click', () => {
      document.body.classList.remove('chat-open');
    });
    // El botón Enviar solo se activa con texto
    messageInput.addEventListener('input', () => {
      if (currentChatId) sendBtn.disabled = messageInput.value.trim().length === 0;
    });

    async function handleSend() {
      if (!currentChatId) return;
      const text = messageInput.value.trim();
      if (!text) return;
      messageInput.value = '';
      try {
        await sendMessage(currentChatId, { uid, name: myName, avatar: profileInfo.profilePic }, text);
      } catch (err) {
        console.error(err);
        showToast("Couldn't send that message. Try again.");
      }
    }
    sendBtn.addEventListener('click', handleSend);
    messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });

    // ---- Crear chat ----
    newChatBtn.addEventListener('click', () => {
      newChatName.value = '';
      openModal(newChatModal);
      setTimeout(() => newChatName.focus(), 200);
    });
    closeNewChatModal.addEventListener('click', () => closeModal(newChatModal));

    createChatBtn.addEventListener('click', async () => {
      const name = newChatName.value.trim();
      if (!name) { showToast("Give your chat a name first."); return; }
      createChatBtn.disabled = true;
      try {
        const newId = await createChat(uid, name);
        closeModal(newChatModal);
        showToast(`Chat "${name}" created!`);
        // El listener en tiempo real actualizará la lista solo; abrimos el chat en cuanto llegue
        setTimeout(() => openChat(newId), 400);
      } catch (err) {
        console.error(err);
        showToast("Couldn't create the chat. Try again.");
      } finally {
        createChatBtn.disabled = false;
      }
    });

    // ---- Invitar por email ----
    inviteBtn.addEventListener('click', () => {
      if (!currentChatId) return;
      inviteEmail.value = '';
      openModal(inviteModal);
      setTimeout(() => inviteEmail.focus(), 200);
    });
    closeInviteModal.addEventListener('click', () => closeModal(inviteModal));

    sendInviteBtn.addEventListener('click', async () => {
      const email = inviteEmail.value.trim();
      if (!email) return;
      sendInviteBtn.disabled = true;
      sendInviteBtn.textContent = "Inviting...";
      try {
        const foundUser = await findUserByEmail(email);
        if (!foundUser) {
          showToast("No FOCUS user found with that email.");
        } else {
          await inviteToChat(currentChatId, foundUser.uid);
          showToast(`${email} added to the chat!`);
          closeModal(inviteModal);
        }
      } catch (err) {
        console.error(err);
        showToast("Couldn't send the invite. Try again.");
      } finally {
        sendInviteBtn.disabled = false;
        sendInviteBtn.textContent = "Send Invite";
      }
    });

    // ---- Cambiar foto del chat ----
    changeAvatarBtn.addEventListener('click', () => {
      if (!currentChatId) return;
      newAvatarFile.value = '';
      openModal(changeAvatarModal);
    });
    closeAvatarModal.addEventListener('click', () => closeModal(changeAvatarModal));

    saveAvatarBtn.addEventListener('click', async () => {
      const file = newAvatarFile.files[0];
      if (!file) return;
      saveAvatarBtn.disabled = true;
      try {
        const resized = await resizeImageFile(file, 300, 0.8);
        await updateChatAvatar(currentChatId, resized);
        closeModal(changeAvatarModal);
        showToast("Chat photo updated!");
      } catch (err) {
        console.error(err);
        showToast("Couldn't update the photo. Try again.");
      } finally {
        saveAvatarBtn.disabled = false;
      }
    });

    /* -- Transición dinámica entre páginas -- */
    document.querySelectorAll('.nav-item a, .header h1 a').forEach(link => {
      link.addEventListener('click', (e) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        e.preventDefault();
        document.body.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
        document.body.style.opacity = '0';
        document.body.style.transform = 'translateY(-6px)';
        setTimeout(() => { window.location.href = href; }, 200);
      });
    });
  </script>
  <script type="module" src="dock-nav.js"></script>
</body>
</html>
