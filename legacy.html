<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focus - Legado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="you-vs-you.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #100F19;
      color: #fff;
      opacity: 0;
      animation: pageFadeIn 0.4s ease forwards;
    }
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      background-color: #00000A;
      text-align: center;
      padding: 1.75rem 1rem 1.1rem;
    }
    .header h1 { font-size: 2.4rem; font-weight: 700; }
    .header h1 a { text-decoration: none; color: #fff; transition: color 0.2s; }
    .header h1 a:hover { color: #ccc; }
    .header .page-tagline { font-size: 0.85rem; color: #777; margin-top: 0.4rem; letter-spacing: 0.02em; }

    .view-switch {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 1.25rem auto 0;
      flex-wrap: wrap;
      row-gap: 0.4rem;
    }
    .view-switch button {
      background: none; border: none; color: #777;
      font-weight: 700; font-size: 0.85rem;
      padding: 0.5rem 1.1rem; border-radius: 20px; cursor: pointer;
      transition: background-color 0.2s, color 0.2s, opacity 0.2s;
    }
    .view-switch button:hover:not(:disabled) { color: #ccc; }
    .view-switch button.active { background-color: #201F28; color: #F5F5F7; }
    .view-switch button:disabled { opacity: 0.4; cursor: default; }

    section.section-block { width: 90%; max-width: 640px; margin: 1.75rem auto 0; }

    /* Hero de horas totales */
    .hero-card {
      background: linear-gradient(180deg, #201F28, #171620);
      border-radius: 20px;
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .hero-label { font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; }
    .hero-number { font-size: 3rem; font-weight: 700; color: #F5F5F7; line-height: 1.1; margin-top: 0.4rem; }
    .hero-number .unit { font-size: 1.3rem; color: #888; font-weight: 600; margin-left: 4px; }
    .hero-caption { font-size: 0.85rem; color: #999; margin-top: 0.4rem; }

    /* Racha */
    .streak-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
    .streak-card {
      background-color: #201F28;
      border-radius: 16px;
      padding: 1.1rem;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .streak-number { font-size: 1.8rem; font-weight: 700; color: #F5F5F7; }
    .streak-label { font-size: 0.72rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 0.2rem; }

    /* Identidad */
    .identity-banner {
      margin-top: 1.5rem;
      background: linear-gradient(135deg, #2F2E37, #171620);
      border-radius: 16px;
      padding: 1.3rem 1.4rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .identity-eyebrow { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; margin-bottom: 0.5rem; }
    .identity-text { font-size: 1.05rem; line-height: 1.5; color: #eee; font-weight: 600; }
    .identity-text strong { color: #F5F5F7; }

    /* Categorías */
    .section-title { font-size: 1.1rem; font-weight: 700; margin: 1.75rem 0 1rem; }
    .evidence-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
    }
    .evidence-card {
      background: linear-gradient(180deg, #201F28, #171620);
      border-radius: 18px;
      padding: 1.2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .evidence-icon {
      width: 46px; height: 46px; border-radius: 50%;
      background-color: #2F2E37;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
    }
    .evidence-icon img { width: 52%; height: 52%; object-fit: contain; }
    .evidence-stat { font-size: 1.3rem; font-weight: 700; color: #F5F5F7; }
    .evidence-label { font-size: 0.68rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }
    .evidence-sub { font-size: 0.72rem; color: #777; text-align: center; }

    /* Hitos */
    .milestone-card {
      background-color: #201F28;
      border-radius: 14px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.7rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .milestone-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .milestone-name { font-size: 0.88rem; font-weight: 700; color: #F5F5F7; }
    .milestone-badge {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      background-color: #2F2E37; color: #ccc;
      padding: 0.2rem 0.6rem; border-radius: 10px;
    }
    .milestone-track { width: 100%; height: 8px; background-color: #100F19; border-radius: 6px; overflow: hidden; }
    .milestone-fill { height: 100%; background: linear-gradient(90deg, #55525f, #F5F5F7); border-radius: 6px; transition: width 0.8s cubic-bezier(0.22,1,0.36,1); }
    .milestone-next { font-size: 0.72rem; color: #777; margin-top: 0.4rem; }

    /* Otras huellas */
    .footprint-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; }
    .footprint-card {
      background-color: #201F28; border-radius: 14px; padding: 1rem 0.6rem;
      text-align: center; box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .footprint-number { font-size: 1.4rem; font-weight: 700; color: #F5F5F7; }
    .footprint-label { font-size: 0.66rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 0.2rem; }

    .empty-state { text-align: center; color: #777; font-size: 0.9rem; padding: 2rem 1rem; }

    /* Por qué / Orígenes */
    .why-card, .road-block {
      background: linear-gradient(180deg, #201F28, #171620);
      border-radius: 18px;
      padding: 1.4rem 1.4rem;
      margin-bottom: 1rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .why-eyebrow, .road-eyebrow, .future-eyebrow {
      font-size: 0.7rem; color: #D4AF6D; text-transform: uppercase;
      letter-spacing: 0.08em; font-weight: 700; margin-bottom: 0.6rem;
    }
    .why-text { font-size: 1rem; line-height: 1.6; color: #F5F5F7; font-style: italic; }
    .why-empty { font-size: 0.9rem; line-height: 1.55; color: #aaa; }
    .link-btn {
      background: none; border: none; color: #D4AF6D; font-size: 0.8rem;
      font-weight: 700; cursor: pointer; margin-top: 0.6rem; padding: 0;
    }
    .reason-form { display: flex; flex-direction: column; gap: 0.7rem; margin-top: 0.8rem; }
    .reason-form textarea {
      width: 100%; min-height: 80px; padding: 0.8rem; border-radius: 12px;
      border: 2px solid #2F2E37; outline: none; background-color: #100F19;
      color: #fff; font-size: 0.92rem; font-family: inherit; resize: vertical;
      transition: border-color 0.2s;
    }
    .reason-form textarea:focus { border-color: #D4AF6D; }
    .btn-gold {
      align-self: flex-start;
      background-color: #D4AF6D; color: #100F19; border: none;
      padding: 0.6rem 1.2rem; border-radius: 20px; font-weight: 700;
      font-size: 0.85rem; cursor: pointer; transition: background-color 0.2s;
    }
    .btn-gold:hover { background-color: #e3c184; }
    .road-text { font-size: 0.92rem; line-height: 1.65; color: #ddd; }
    .legacy-quote {
      text-align: center; font-size: 1rem; font-weight: 600; color: #F5F5F7;
      line-height: 1.6; padding: 1.5rem 1rem; font-style: italic;
      border-top: 1px solid rgba(212,175,109,0.25); margin-top: 1.5rem;
    }

    /* Yo futuro */
    .future-hero {
      background: linear-gradient(135deg, #2F2E37, #171620);
      border-radius: 18px; padding: 1.4rem; margin-bottom: 1.25rem;
      box-shadow: 0 0 0 1px rgba(212,175,109,0.15);
    }
    .future-hero p { font-size: 0.95rem; line-height: 1.6; color: #eee; }
    .future-period-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .future-period-tabs button {
      flex: 1; background-color: #201F28; border: none; color: #999;
      padding: 0.55rem; border-radius: 12px; font-weight: 700; font-size: 0.82rem;
      cursor: pointer; transition: background-color 0.2s, color 0.2s;
    }
    .future-period-tabs button.active { background-color: #D4AF6D; color: #100F19; }
    .future-empty { text-align: center; color: #777; font-size: 0.9rem; padding: 2.5rem 1.5rem; }

    /* Escenarios de proyección */
    .future-scenarios { display: flex; gap: 0.6rem; margin-bottom: 1.25rem; }
    .scenario-card {
      flex: 1; background: linear-gradient(180deg, #201F28, #171620);
      border-radius: 14px; padding: 0.85rem 0.5rem; text-align: center;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
    }
    .scenario-card.main { box-shadow: 0 0 0 1px rgba(212,175,109,0.45); }
    .scenario-num { display: block; font-size: 1.15rem; font-weight: 700; color: #F5F5F7; }
    .scenario-card.main .scenario-num { color: #D4AF6D; }
    .scenario-label { display: block; font-size: 0.62rem; color: #888; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 0.3rem; line-height: 1.3; }

    /* Análisis de constancia */
    .future-analysis-title {
      font-size: 0.7rem; color: #D4AF6D; text-transform: uppercase;
      letter-spacing: 0.08em; font-weight: 700; margin: 0 0 0.6rem;
      text-align: left;
    }
    .future-insights { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1.25rem; }
    .insight-card {
      background-color: #171620; border-radius: 14px; padding: 0.9rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05); text-align: left;
    }
    .insight-num { font-size: 1.3rem; font-weight: 700; color: #F5F5F7; }
    .insight-num .up { color: #57e32c; } .insight-num .down { color: #e05b5b; }
    .insight-label { font-size: 0.66rem; color: #D4AF6D; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; margin-top: 0.15rem; }
    .insight-sub { font-size: 0.74rem; color: #999; line-height: 1.45; margin-top: 0.35rem; }
    .habit-track { height: 7px; background-color: #100F19; border-radius: 4px; margin-top: 0.5rem; overflow: hidden; }
    .habit-fill { height: 100%; background: linear-gradient(90deg, #D4AF6D, #E8CA8E); border-radius: 4px; }
    .future-note { font-size: 0.72rem; color: #777; line-height: 1.5; margin-bottom: 1.25rem; text-align: left; }

    /* Tú contra ti */
    .yvy-wrap { text-align: center; }
    .yvy-intro { font-size: 0.85rem; color: #999; line-height: 1.5; margin: -0.3rem 0 1.3rem; }
    .yvy-mount {
      width: min(100%, 480px);
      margin: 0 auto 1rem;
    }
    .yvy-panel {
      text-align: left;
      background: linear-gradient(180deg, #201F28, #171620);
      border-radius: 18px; padding: 1.4rem;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
      min-height: 70px;
    }
    .yvy-panel-title { font-size: 1rem; font-weight: 700; color: #F5F5F7; margin-bottom: 0.9rem; }
    .yvy-metric-row { display: flex; gap: 0.8rem; margin-bottom: 1.1rem; }
    .yvy-metric { flex: 1; background-color: #100F19; border-radius: 12px; padding: 0.8rem 0.5rem; text-align: center; }
    .yvy-metric-num { display: block; font-size: 1.25rem; font-weight: 700; color: #D4AF6D; }
    .yvy-metric-label { display: block; font-size: 0.64rem; color: #888; text-transform: uppercase; letter-spacing: 0.03em; margin-top: 0.3rem; line-height: 1.3; }
    .yvy-text { font-size: 0.88rem; line-height: 1.65; color: #ddd; margin-bottom: 0.85rem; }
    .yvy-text:last-child { margin-bottom: 0; }
    .yvy-quote { font-style: italic; color: #F5F5F7; }
    .yvy-hint, .yvy-empty { text-align: center; color: #888; font-size: 0.88rem; padding: 1rem 0.5rem; }

    /* Mentor */
    /* Retrato del yo futuro */
    .portrait-card {
      background: linear-gradient(180deg, rgba(212,175,109,0.08), rgba(212,175,109,0.015));
      border: 1px solid rgba(212,175,109,0.25);
      border-radius: 18px; padding: 1.4rem 1.3rem; margin: 1.4rem 0 1rem;
    }
    .portrait-date {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: #D4AF6D; margin-bottom: 0.6rem;
    }
    .portrait-text { font-size: 0.95rem; line-height: 1.65; color: #ddd; }
    .portrait-text strong { color: #fff; }
    .diverge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin: 1rem 0; }
    @media (max-width: 560px) { .diverge-grid { grid-template-columns: 1fr; } }
    .diverge-card { border-radius: 16px; padding: 1.1rem 1rem; font-size: 0.85rem; line-height: 1.55; }
    .diverge-card .diverge-title {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 0.55rem;
    }
    .diverge-card ul { margin: 0; padding-left: 1.05rem; }
    .diverge-card li { margin-bottom: 0.35rem; }
    .diverge-card.keep { background: rgba(212,175,109,0.08); border: 1px solid rgba(212,175,109,0.3); color: #e8dcc4; }
    .diverge-card.keep .diverge-title { color: #D4AF6D; }
    .diverge-card.drop { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.09); color: #999; }
    .diverge-card.drop .diverge-title { color: #888; }
    .future-letter {
      background: #171620; border-radius: 18px; padding: 1.4rem 1.3rem; margin-top: 1rem;
      border-left: 3px solid #D4AF6D;
    }
    .future-letter .letter-eyebrow {
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;
      color: #D4AF6D; margin-bottom: 0.6rem;
    }
    .future-letter p { font-size: 0.92rem; line-height: 1.65; color: #ccc; margin-bottom: 0.6rem; font-style: italic; }
    .future-letter p:last-child { margin-bottom: 0; }
    .future-letter .letter-sign { text-align: right; font-style: normal; color: #D4AF6D; font-weight: 600; font-size: 0.88rem; }
    .companion-intro { font-size: 0.85rem; color: #888; text-align: center; margin-bottom: 1rem; line-height: 1.5; }
    .companion-chat {
      display: flex; flex-direction: column; gap: 0.7rem;
      min-height: 120px; margin-bottom: 1rem;
    }
    .companion-bubble {
      max-width: 82%; padding: 0.7rem 0.95rem; border-radius: 16px;
      font-size: 0.9rem; line-height: 1.5;
    }
    .companion-bubble.assistant {
      align-self: flex-start; background-color: #201F28; color: #eee;
      border-bottom-left-radius: 4px;
    }
    .companion-bubble.user {
      align-self: flex-end; background-color: #D4AF6D; color: #100F19;
      border-bottom-right-radius: 4px; font-weight: 600;
    }
    .companion-prompts { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .prompt-chip {
      background-color: #201F28; color: #ddd; border: 1px solid rgba(212,175,109,0.3);
      padding: 0.5rem 0.9rem; border-radius: 20px; font-size: 0.82rem;
      cursor: pointer; transition: background-color 0.2s, border-color 0.2s;
    }
    .prompt-chip:hover { background-color: #2F2E37; border-color: #D4AF6D; }
    .companion-input-row { display: flex; gap: 0.5rem; }
    .companion-input-row input {
      flex: 1; border: 2px solid #2F2E37; border-radius: 20px;
      padding: 0.65rem 1rem; outline: none; font-size: 0.92rem;
      background-color: #100F19; color: #fff; font-family: inherit;
      transition: border-color 0.2s;
    }
    .companion-input-row input:focus { border-color: #D4AF6D; }
    .companion-input-row button {
      background-color: #D4AF6D; border: none; color: #100F19; font-weight: 700;
      border-radius: 20px; padding: 0 1.3rem; cursor: pointer; font-size: 0.85rem;
      transition: background-color 0.2s;
    }
    .companion-input-row button:hover { background-color: #e3c184; }

    .footer-space { height: 2.5rem; }

    .footer { background-color: #00000A; padding: 1rem 0; margin-top: 1rem; }
    .bottom-nav { display: flex; justify-content: space-around; align-items: center; }
    .nav-item a {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; color: #fff;
      padding: 0.3rem 0.9rem; border-radius: 12px;
      transition: background-color 0.2s, opacity 0.2s;
    }
    .nav-item a:hover { opacity: 0.85; }
    .nav-item.active a { background-color: rgba(255,255,255,0.06); }
    .nav-item.active .image { background-color: rgba(212,175,109,0.14); }
    .nav-item.active .image svg { color: #D4AF6D; }
    .nav-item span { font-size: 0.85rem; margin-top: 0.3rem; }
    .image {
      width: 50px; height: 50px; margin-bottom: 0.2rem;
      overflow: hidden; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      background-color: #201F28;
    }
    .image img { width: 100%; height: 100%; object-fit: cover; }
    .image svg { width: 46%; height: 46%; }
    .image-icon { display: flex; justify-content: center; align-items: center; }
    .image-icon svg { width: 50%; height: 50%; color: #777; transition: color 0.2s; }
    .nav-item.active .image-icon svg { color: #D4AF6D; }
  </style>
</head>
<body>

  <header class="header">
    <h1><a href="index.html">Focus.</a></h1>
    <div class="page-tagline">Legado — la historia que cuentan tus datos</div>
  </header>

  <div class="view-switch">
    <button id="evidenceTabBtn" class="active">Evidencia.</button>
    <button id="originsTabBtn">¿Por qué? / Orígenes</button>
    <button id="futureTabBtn">Yo futuro</button>
    <button id="companionTabBtn">Mentor.</button>
  </div>

  <!-- EVIDENCIA -->
  <section id="evidenceView">
    <section class="section-block" id="heroSection"></section>
    <section class="section-block" id="identitySection"></section>

    <section class="section-block">
      <h2 class="section-title">Por categoría</h2>
      <div class="evidence-grid" id="evidenceGrid"></div>
    </section>

    <section class="section-block">
      <h2 class="section-title">Hitos</h2>
      <div id="milestonesContainer"></div>
    </section>

    <section class="section-block">
      <h2 class="section-title">También forma parte de tu historia</h2>
      <div class="footprint-row" id="footprintRow"></div>
    </section>

    <div class="footer-space"></div>
  </section>

  <!-- ¿POR QUÉ? / ORÍGENES -->
  <section id="originsView" class="section-block" style="display:none;">
    <div id="originsContent"></div>
    <div class="footer-space"></div>
  </section>

  <!-- YO FUTURO -->
  <section id="futureView" class="section-block" style="display:none;">
    <div id="futureContent"></div>
    <div class="footer-space"></div>
  </section>

  <!-- COMPAÑERO -->
  <section id="companionView" class="section-block" style="display:none;">
    <div id="companionContent"></div>
    <div class="footer-space"></div>
  </section>

  <footer class="footer">
    <nav class="bottom-nav">
      <div class="nav-item">
        <a href="memories.html">
          <div class="image image-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"/><circle cx="8.5" cy="10" r="1.6"/><path d="M4 17l4.5-4.5a1.5 1.5 0 0 1 2.1 0L13 15l2-2a1.5 1.5 0 0 1 2.1 0L20 16"/></svg></div>
          <span>Memories.</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="socialclub.html">
          <div class="image image-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v7a2.5 2.5 0 0 1-2.5 2.5H10l-4.5 4v-4H6.5A2.5 2.5 0 0 1 4 13.5v-7Z"/></svg></div>
          <span>Socialclub.</span>
        </a>
      </div>
      <div class="nav-item">
        <a href="communities.html">
          <div class="image image-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5.5" r="2.3"/><circle cx="6" cy="17" r="2.3"/><circle cx="18" cy="17" r="2.3"/><path d="M10.3 7.3 7.3 15.1M13.7 7.3l3 7.8M8.3 17h7.4"/></svg></div>
          <span>Communities.</span>
        </a>
      </div>
      <div class="nav-item active">
        <a href="legacy.html">
          <div class="image image-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21v-9"/><path d="M12 12c0-4-3-6-7-6 0 4 3 6 7 6Z"/><path d="M12 15c0-4 3-6 7-6 0 4-3 6-7 6Z"/></svg></div>
          <span>Legacy.</span>
        </a>
      </div>
    </nav>
  </footer>

  <script type="module">
    import { requireAuth, loadUserDoc, saveUserDoc, getItems, getUserPosts } from "./firebase-init.js";
    import { mountYouVsYou } from "./you-vs-you.js";

    const user = await requireAuth();
    const uid = user.uid;

    // Set de iconos FOCUS: linea fina dorada, coherente con la marca
    const FOCUS_ICONS = {
      '1f4d6': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M12 5.6C10.3 4.3 8 3.9 5.5 3.9c-.8 0-1.5.6-1.5 1.4v11.5c0 .8.7 1.4 1.5 1.4 2.5 0 4.8.4 6.5 1.7 1.7-1.3 4-1.7 6.5-1.7.8 0 1.5-.6 1.5-1.4V5.3c0-.8-.7-1.4-1.5-1.4-2.5 0-4.8.4-6.5 1.7Z"/><path d="M12 5.6v14.3"/></svg>`,
      '1f4aa': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M6.8 6.8v10.4M3.8 9.2v5.6M17.2 6.8v10.4M20.2 9.2v5.6M6.8 12h10.4"/></svg>`,
      '1f9d8': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M12 3.8c1.5 1.9 2.3 3.7 2.3 5.6 0 1.9-.8 3.3-2.3 4.3-1.5-1-2.3-2.4-2.3-4.3 0-1.9.8-3.7 2.3-5.6Z"/><path d="M5.2 9.2c2.7.4 4.7 1.5 6 3.4M18.8 9.2c-2.7.4-4.7 1.5-6 3.4"/><path d="M4.6 14.9c1.6 3 4.1 4.6 7.4 4.6s5.8-1.6 7.4-4.6c-2.4-.8-4.8-1.2-7.4-1.2s-5 .4-7.4 1.2Z"/></svg>`,
      '1f4bc': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><rect x="3.5" y="7.8" width="17" height="11.2" rx="2.2"/><path d="M9 7.8V6.1A2.1 2.1 0 0 1 11.1 4h1.8A2.1 2.1 0 0 1 15 6.1v1.7M3.5 12.4h17"/></svg>`,
      '1f64f': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M12 3.6c-2.3 3.1-3.9 6.2-3.9 9.7v4A2.7 2.7 0 0 0 10.8 20h2.4a2.7 2.7 0 0 0 2.7-2.7v-4c0-3.5-1.6-6.6-3.9-9.7Z"/><path d="M12 7.6V20"/></svg>`,
      '1f957': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M12 7.6c-1-1-2.3-1.5-3.7-1.3C5.6 6.7 4 9.1 4.4 12c.5 3.7 2.8 7.4 5.3 7.4 1 0 1.6-.5 2.3-.5s1.3.5 2.3.5c2.5 0 4.8-3.7 5.3-7.4.4-2.9-1.2-5.3-3.9-5.7-1.4-.2-2.7.3-3.7 1.3Z"/><path d="M12 7.6c0-2.1 1.3-3.6 3.2-4.1"/></svg>`,
      '1f525': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M12 3.5c.6 2.5-.3 4.2-1.8 5.8-1.4 1.5-2.7 3-2.7 5.2a6.5 6.5 0 0 0 13 0c0-3.2-1.9-4.9-3.1-6.9-.6 1-1.4 1.6-2.3 1.7.3-2.1-.7-4.4-3.1-5.8Z"/></svg>`,
      '1f3c6': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M8 4h8v5.2a4 4 0 0 1-8 0V4Z"/><path d="M8 5.5H5.2c.1 2.5 1.3 4 2.9 4.3M16 5.5h2.8c-.1 2.5-1.3 4-2.9 4.3M12 13.2v3.3M9.8 20l.6-3.5h3.2l.6 3.5M8.5 20h7"/></svg>`,
      '1f389': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;vertical-align:-0.125em"><path d="M12 3.8l1.7 4.5 4.5 1.7-4.5 1.7L12 16.2l-1.7-4.5L5.8 10l4.5-1.7L12 3.8Z"/><path d="M18.6 15.4l.7 1.9 1.9.7-1.9.7-.7 1.9-.7-1.9-1.9-.7 1.9-.7.7-1.9Z"/></svg>`
    };
    function twemojiImg(code, alt = "") { return FOCUS_ICONS[code] || ''; }

    const TABS = {
      evidence:  { btn: 'evidenceTabBtn',  view: 'evidenceView' },
      origins:   { btn: 'originsTabBtn',   view: 'originsView' },
      future:    { btn: 'futureTabBtn',    view: 'futureView' },
      companion: { btn: 'companionTabBtn', view: 'companionView' }
    };
    function switchTab(name) {
      Object.entries(TABS).forEach(([key, refs]) => {
        const btn = document.getElementById(refs.btn);
        const view = document.getElementById(refs.view);
        const active = key === name;
        btn.classList.toggle('active', active);
        view.style.display = active ? 'block' : 'none';
      });
    }
    Object.entries(TABS).forEach(([key, refs]) => {
      document.getElementById(refs.btn).addEventListener('click', () => switchTab(key));
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---- Cargamos todos los datos que alimentan Evidencia ----
    const savedData = await loadUserDoc(uid);
    const timeSpent = savedData.timeSpent || {};
    const defaults = {
      read: 0, trained: 0, meditated: 0, worked: 0,
      prayedYesCount: 0, dietYesCount: 0,
      readSessions: 0, trainedSessions: 0, meditatedSessions: 0, workedSessions: 0
    };
    Object.keys(defaults).forEach(k => { if (typeof timeSpent[k] !== 'number') timeSpent[k] = defaults[k]; });

    const photos = await getItems(uid, "photos", 400);
    const myPosts = await getUserPosts(uid).catch(() => []);
    const myBooks = await getItems(uid, "books", 200).catch(() => []);

    let profileInfo = savedData.profileInfo || { realName: "", userName: "", description: "", profilePic: "", reason: "" };
    const creationTime = user.metadata && user.metadata.creationTime ? new Date(user.metadata.creationTime) : null;
    const daysSinceStart = creationTime
      ? Math.max(1, Math.round((Date.now() - creationTime.getTime()) / 86400000))
      : Math.max(1, (timeSpent.readSessions || 0) + (timeSpent.trainedSessions || 0) + (timeSpent.meditatedSessions || 0) + (timeSpent.workedSessions || 0));

    function animateNumber(el, from, to, duration = 900, decimals = 0) {
      const start = performance.now();
      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
        const current = from + (to - from) * eased;
        el.textContent = decimals > 0 ? current.toFixed(decimals) : Math.round(current);
        if (progress < 1) requestAnimationFrame(tick);
        else el.textContent = decimals > 0 ? to.toFixed(decimals) : to;
      }
      requestAnimationFrame(tick);
    }

    // =======================================================
    // 1) Hero: horas totales de Focus
    // =======================================================
    const totalMinutes = timeSpent.read + timeSpent.trained + timeSpent.meditated + timeSpent.worked;
    const totalHours = totalMinutes / 60;
    const totalSessions = timeSpent.readSessions + timeSpent.trainedSessions + timeSpent.meditatedSessions + timeSpent.workedSessions;

    document.getElementById('heroSection').innerHTML = `
      <div class="hero-card">
        <div class="hero-label">Focus total acumulado</div>
        <div class="hero-number"><span id="heroHours">0</span><span class="unit">horas</span></div>
        <div class="hero-caption" id="heroCaption"></div>
      </div>
    `;
    animateNumber(document.getElementById('heroHours'), 0, totalHours, 1000, 1);
    document.getElementById('heroCaption').textContent =
      totalSessions > 0
        ? `En ${totalSessions} ${totalSessions === 1 ? 'sesión' : 'sesiones'} registrada${totalSessions === 1 ? '' : 's'}`
        : "Registra tu primera sesión para empezar a construir tu Legado";

    // =======================================================
    // 2) Rachas (a partir de las fotos diarias de Memories)
    // =======================================================
    function pad(n) { return String(n).padStart(2, '0'); }
    function formatDateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }

    const dateSet = new Set(photos.map(p => p.dateKey).filter(Boolean));

    function computeStreaks(dateSet) {
      let current = 0;
      let cursor = new Date();
      // Si hoy aún no hay foto, empezamos a contar desde ayer
      if (!dateSet.has(formatDateKey(cursor))) cursor.setDate(cursor.getDate() - 1);
      while (dateSet.has(formatDateKey(cursor))) {
        current++;
        cursor.setDate(cursor.getDate() - 1);
      }
      const sorted = [...dateSet].sort();
      let longest = 0, run = 0, prevDate = null;
      sorted.forEach(key => {
        const dt = new Date(key + "T00:00:00");
        if (prevDate && Math.round((dt - prevDate) / 86400000) === 1) run++;
        else run = 1;
        longest = Math.max(longest, run);
        prevDate = dt;
      });
      return { current, longest: Math.max(longest, current) };
    }
    const { current: currentStreak, longest: longestStreak } = computeStreaks(dateSet);

    document.getElementById('heroSection').insertAdjacentHTML('beforeend', `
      <div class="streak-row">
        <div class="streak-card">
          <div class="streak-number">${twemojiImg("1f525", "Racha")} ${currentStreak}</div>
          <div class="streak-label">Racha actual</div>
        </div>
        <div class="streak-card">
          <div class="streak-number">${twemojiImg("1f3c6", "Récord")} ${longestStreak}</div>
          <div class="streak-label">Racha más larga</div>
        </div>
      </div>
    `);

    // =======================================================
    // 3) Frase de identidad
    // =======================================================
    const identityCategories = [
      { key: 'read', phrase: 'alguien que Lee', icon: twemojiImg("1f4d6", "Reading") },
      { key: 'trained', phrase: 'alguien que Entrena', icon: twemojiImg("1f4aa", "Training") },
      { key: 'meditated', phrase: 'alguien que Medita', icon: twemojiImg("1f9d8", "Meditation") },
      { key: 'worked', phrase: 'alguien que Construye', icon: twemojiImg("1f4bc", "Work") }
    ];
    const dominant = identityCategories.reduce((max, c) => (timeSpent[c.key] > timeSpent[max.key] ? c : max), identityCategories[0]);
    const identitySection = document.getElementById('identitySection');

    if (totalMinutes === 0) {
      identitySection.innerHTML = `
        <div class="identity-banner">
          <div class="identity-eyebrow">Tu legado</div>
          <div class="identity-text">Cada entrada que registres a partir de ahora pasa a formar parte de tu historia. Todavía no hay nada aquí — eso está a punto de cambiar.</div>
        </div>`;
    } else {
      const hrs = (timeSpent[dominant.key] / 60).toFixed(1);
      identitySection.innerHTML = `
        <div class="identity-banner">
          <div class="identity-eyebrow">Tu legado</div>
          <div class="identity-text">Tus datos apuntan a algo claro: te estás convirtiendo en <strong>${dominant.phrase}</strong>. ${hrs} horas y ${timeSpent[dominant.key + 'Sessions']} sesiones, y sigue sumando.</div>
        </div>`;
    }

    // =======================================================
    // 4) Tarjetas por categoría
    // =======================================================
    const evidenceGrid = document.getElementById('evidenceGrid');
    const categoryDefs = [
      { key: 'read', label: 'Reading', icon: twemojiImg("1f4d6", "Reading"), type: 'minutes' },
      { key: 'trained', label: 'Training', icon: twemojiImg("1f4aa", "Training"), type: 'minutes' },
      { key: 'meditated', label: 'Meditation', icon: twemojiImg("1f9d8", "Meditation"), type: 'minutes' },
      { key: 'worked', label: 'Work', icon: twemojiImg("1f4bc", "Work"), type: 'minutes' },
      { key: 'prayed', label: 'Prayer', icon: twemojiImg("1f64f", "Prayer"), type: 'yescount', field: 'prayedYesCount' },
      { key: 'diet', label: 'Diet', icon: twemojiImg("1f957", "Diet"), type: 'yescount', field: 'dietYesCount' }
    ];
    evidenceGrid.innerHTML = categoryDefs.map(cat => {
      if (cat.type === 'minutes') {
        const hrs = (timeSpent[cat.key] / 60).toFixed(1);
        const sessions = timeSpent[cat.key + 'Sessions'] || 0;
        return `
          <div class="evidence-card">
            <div class="evidence-icon">${cat.icon}</div>
            <div class="evidence-stat">${hrs}h</div>
            <div class="evidence-label">${cat.label}</div>
            <div class="evidence-sub">${sessions} ${sessions === 1 ? 'sesión' : 'sesiones'} registrada${sessions === 1 ? '' : 's'}</div>
          </div>`;
      } else {
        const count = timeSpent[cat.field] || 0;
        return `
          <div class="evidence-card">
            <div class="evidence-icon">${cat.icon}</div>
            <div class="evidence-stat">${count}</div>
            <div class="evidence-label">${cat.label}</div>
            <div class="evidence-sub">día${count === 1 ? '' : 's'} marcado${count === 1 ? '' : 's'} como "sí"</div>
          </div>`;
      }
    }).join('');

    // =======================================================
    // 5) Hitos con progreso hacia el siguiente
    // =======================================================
    function milestoneProgress(value, thresholds) {
      let achieved = null;
      let next = thresholds[0];
      for (let i = 0; i < thresholds.length; i++) {
        if (value >= thresholds[i]) { achieved = thresholds[i]; next = thresholds[i + 1] || null; }
      }
      const base = achieved || 0;
      const target = next || achieved || thresholds[0];
      const pct = next ? Math.min(100, ((value - base) / (target - base)) * 100) : 100;
      return { achieved, next, pct };
    }

    const milestoneDefs = [
      { name: 'Horas acumuladas', value: totalHours, thresholds: [1, 5, 10, 25, 50, 100, 200], unit: 'horas' },
      { name: 'Racha de días', value: longestStreak, thresholds: [3, 7, 14, 30, 60, 100], unit: 'días' },
      { name: 'Sesiones registradas', value: totalSessions, thresholds: [5, 15, 30, 75, 150, 300], unit: 'sesiones' }
    ];

    document.getElementById('milestonesContainer').innerHTML = milestoneDefs.map(m => {
      const { achieved, next, pct } = milestoneProgress(m.value, m.thresholds);
      return `
        <div class="milestone-card">
          <div class="milestone-top">
            <span class="milestone-name">${m.name}</span>
            <span class="milestone-badge">${achieved ? achieved + ' ' + m.unit : 'Sin empezar'}</span>
          </div>
          <div class="milestone-track"><div class="milestone-fill" style="width:${pct}%"></div></div>
          <div class="milestone-next">${next ? `Faltan ${(next - m.value).toFixed(m.unit === 'horas' ? 1 : 0)} ${m.unit} para llegar a ${next}` : `Hito máximo alcanzado ${twemojiImg("1f389", "")}`}</div>
        </div>`;
    }).join('');

    // =======================================================
    // 6) Otras huellas de tu actividad en FOCUS
    // =======================================================
    document.getElementById('footprintRow').innerHTML = `
      <div class="footprint-card">
        <div class="footprint-number">${photos.length}</div>
        <div class="footprint-label">Momentos capturados</div>
      </div>
      <div class="footprint-card">
        <div class="footprint-number">${myPosts.length}</div>
        <div class="footprint-label">Pensamientos compartidos</div>
      </div>
      <div class="footprint-card">
        <div class="footprint-number">${myBooks.length}</div>
        <div class="footprint-label">Libros añadidos</div>
      </div>
    `;

    // =======================================================
    // 7) ¿POR QUÉ? / ORÍGENES — el motivo, y la historia del camino
    // =======================================================
    function roadBehindText() {
      if (totalMinutes === 0) {
        return "Todavía no hay nada registrado — el camino recorrido empieza en el momento en que registres tu primera sesión.";
      }
      const automaticityNote = daysSinceStart >= 66
        ? `Investigadores del University College London (Lally et al., 2010) descubrieron que un hábito tarda de media 66 días en volverse automático — llevas ${daysSinceStart - 66} día${daysSinceStart - 66 === 1 ? '' : 's'} pasado ese punto, lo que significa que lo que antes exigía fuerza de voluntad ahora funciona casi en piloto automático.`
        : `Esa misma investigación de la UCL descubrió que un hábito tarda de media 66 días en volverse automático — te faltan ${66 - daysSinceStart} día${66 - daysSinceStart === 1 ? '' : 's'} para llegar a ese punto. El esfuerzo que sientes hoy es normal, y ya se va reduciendo con cada sesión.`;
      return `En ${daysSinceStart} día${daysSinceStart === 1 ? '' : 's'} has acumulado ${totalHours.toFixed(1)} horas en ${totalSessions} ${totalSessions === 1 ? 'sesión' : 'sesiones'}. ${automaticityNote} Por el camino te has convertido en ${dominant.phrase}: ${(timeSpent[dominant.key] / 60).toFixed(1)} de esas horas fueron solo para eso. En el lenguaje de la investigación sobre hábitos e identidad, cada una de esas sesiones fue un voto a favor de la persona que estás eligiendo ser.`;
    }

    function roadAheadText() {
      if (totalMinutes === 0) {
        return "Registra tu primera sesión y FOCUS empezará a trazar el camino que tienes por delante.";
      }
      const dailyRate = totalMinutes / daysSinceStart;
      const in90 = (totalMinutes + dailyRate * 90) / 60;
      return `A tu ritmo actual (unos ${Math.round(dailyRate)} minuto${Math.round(dailyRate) === 1 ? '' : 's'}/día) vas camino de acumular unas ${in90.toFixed(0)} horas dentro de 90 días, sin cambiar nada. Los psicólogos Teresa Amabile y Steven Kramer lo llaman el "principio del progreso": de todo lo que sostiene la motivación, el progreso visible es lo que más importa — y se acumula. Los próximos 90 días ya se están decidiendo con lo que registres hoy.`;
    }

    function renderOrigins() {
      const reasonSaved = !!(profileInfo.reason && profileInfo.reason.trim());
      document.getElementById('originsContent').innerHTML = `
        <div class="why-card">
          <div class="why-eyebrow">Por qué empezaste</div>
          ${reasonSaved ? `
            <p class="why-text" id="reasonDisplay">&ldquo;${escapeHtml(profileInfo.reason)}&rdquo;</p>
            <button class="link-btn" id="editReasonBtn">Editar</button>
          ` : `
            <p class="why-empty">Todavía no lo has escrito. Un estudio de la Dra. Gail Matthews (Dominican University of California) descubrió que las personas que escriben su objetivo tienen muchas más probabilidades de cumplirlo. Tómate un minuto ahora — tu yo futuro leerá esto.</p>
          `}
          <div class="reason-form" id="reasonForm" style="display:${reasonSaved ? 'none' : 'flex'};">
            <textarea id="reasonInput" placeholder="Empecé FOCUS porque...">${escapeHtml(profileInfo.reason || '')}</textarea>
            <button class="btn-gold" id="saveReasonBtn">Guardar mi porqué</button>
          </div>
        </div>
        <div class="road-block">
          <div class="road-eyebrow">El camino recorrido</div>
          <p class="road-text">${roadBehindText()}</p>
        </div>
        <div class="road-block">
          <div class="road-eyebrow">El camino por recorrer</div>
          <p class="road-text">${roadAheadText()}</p>
        </div>
        <div class="legacy-quote">${totalSessions > 0
          ? `Este es el legado que FOCUS te está ayudando a construir — no un día perfecto, sino ${totalSessions} días normales que suman a alguien de quien sentirte orgulloso.`
          : `Este es el legado que FOCUS te está ayudando a construir — empieza con una sola sesión normal, cuando estés listo.`}</div>
      `;
    }
    document.getElementById('originsContent').addEventListener('click', (e) => {
      if (e.target.id === 'editReasonBtn') {
        document.getElementById('reasonForm').style.display = 'flex';
        e.target.style.display = 'none';
      }
      if (e.target.id === 'saveReasonBtn') {
        const val = document.getElementById('reasonInput').value.trim();
        profileInfo = { ...profileInfo, reason: val };
        saveUserDoc(uid, { profileInfo }).then(renderOrigins);
      }
    });
    renderOrigins();

    // =======================================================
    // 8a) ANALÍTICA — patrones extraídos de tus días activos
    // =======================================================
    const ANALYTICS = (() => {
      const DOW = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
      const days = [...dateSet].sort();
      const activeDays = days.length;
      const consistencyPct = Math.min(100, Math.round((activeDays / daysSinceStart) * 100));

      // Patrón semanal: cuántas veces has estado activo cada día de la semana
      const dowCounts = [0, 0, 0, 0, 0, 0, 0];
      days.forEach(k => { dowCounts[new Date(k + 'T00:00:00').getDay()]++; });
      let bestDowIdx = 0, worstDowIdx = 0;
      dowCounts.forEach((c, i) => {
        if (c > dowCounts[bestDowIdx]) bestDowIdx = i;
        if (c < dowCounts[worstDowIdx]) worstDowIdx = i;
      });

      // Momentum: últimos 30 días frente a los 30 anteriores
      const now = Date.now();
      const inWindow = (k, from, to) => {
        const t = new Date(k + 'T00:00:00').getTime();
        return t > from && t <= to;
      };
      const last30 = days.filter(k => inWindow(k, now - 30 * 864e5, now)).length;
      const prev30 = days.filter(k => inWindow(k, now - 60 * 864e5, now - 30 * 864e5)).length;
      const momentumPct = prev30 > 0
        ? Math.round(((last30 - prev30) / prev30) * 100)
        : (last30 > 0 ? null : 0); // null = sin base de comparación aún

      // Huecos entre días activos
      let longestGap = 0;
      for (let i = 1; i < days.length; i++) {
        const g = Math.round((new Date(days[i] + 'T00:00:00') - new Date(days[i - 1] + 'T00:00:00')) / 864e5) - 1;
        if (g > longestGap) longestGap = g;
      }

      // Índice de equilibrio entre categorías (uniformidad de Shannon, 0-100)
      const catKeys = ['read', 'trained', 'meditated', 'worked'];
      const mins = catKeys.map(k => timeSpent[k]);
      const totalCat = mins.reduce((a, b) => a + b, 0);
      let balance = 0;
      if (totalCat > 0) {
        const ps = mins.filter(m => m > 0).map(m => m / totalCat);
        const H = -ps.reduce((a, p) => a + p * Math.log(p), 0);
        balance = Math.round((H / Math.log(catKeys.length)) * 100);
      }

      // Progreso hacia la automatización (media de 66 días, Lally et al. 2010)
      const habitPct = Math.min(100, Math.round((activeDays / 66) * 100));

      const CAT_LABELS = { read: 'Lectura', trained: 'Entrenamiento', meditated: 'Meditación', worked: 'Trabajo enfocado' };
      let weakestCat = catKeys[0];
      catKeys.forEach(k => { if (timeSpent[k] < timeSpent[weakestCat]) weakestCat = k; });

      return {
        DOW, activeDays, consistencyPct, dowCounts,
        bestDow: DOW[bestDowIdx], bestDowCount: dowCounts[bestDowIdx],
        worstDow: DOW[worstDowIdx], worstDowCount: dowCounts[worstDowIdx],
        last30, prev30, momentumPct, longestGap, balance, habitPct,
        weakestCat, weakestCatLabel: CAT_LABELS[weakestCat], CAT_LABELS
      };
    })();

    // =======================================================
    // 8b) ANALÍTICA AVANZADA — tendencia, regularidad y
    //     estimaciones psicológicas construidas con tus datos
    // =======================================================
    const ADV = (() => {
      const days = [...dateSet].sort();
      const n = days.length;
      const toT = k => new Date(k + 'T00:00:00').getTime();

      // --- Tendencia: regresión lineal sobre días activos por semana ---
      let trendPerMonth = 0, weeksTracked = 0;
      if (n > 0) {
        const start = toT(days[0]);
        const weeks = [];
        days.forEach(k => {
          const w = Math.floor((toT(k) - start) / (7 * 864e5));
          weeks[w] = (weeks[w] || 0) + 1;
        });
        for (let i = 0; i < weeks.length; i++) if (!weeks[i]) weeks[i] = 0;
        weeksTracked = weeks.length;
        if (weeks.length >= 3) {
          const m = weeks.length;
          const mx = (m - 1) / 2;
          const my = weeks.reduce((a, b) => a + b, 0) / m;
          let num = 0, den = 0;
          for (let i = 0; i < m; i++) { num += (i - mx) * (weeks[i] - my); den += (i - mx) ** 2; }
          trendPerMonth = den ? (num / den) * 4.33 : 0; // días activos ganados/perdidos al mes
        }
      }

      // --- Pausas: cuánto duran de media y cuánto tardas en volver ---
      const gaps = [];
      for (let i = 1; i < n; i++) {
        const g = Math.round((toT(days[i]) - toT(days[i - 1])) / 864e5) - 1;
        if (g > 0) gaps.push(g);
      }
      const avgGap = gaps.length ? gaps.reduce((a, b) => a + b, 0) / gaps.length : 0;

      // --- Regularidad del ritmo: coef. de variación de los intervalos (0-100) ---
      let regularity = n >= 2 ? 100 : 0;
      if (n >= 5) {
        const iv = [];
        for (let i = 1; i < n; i++) iv.push(Math.round((toT(days[i]) - toT(days[i - 1])) / 864e5));
        const mu = iv.reduce((a, b) => a + b, 0) / iv.length;
        const sd = Math.sqrt(iv.reduce((a, b) => a + (b - mu) ** 2, 0) / iv.length);
        const cv = mu ? sd / mu : 0;
        regularity = Math.max(0, Math.round(100 * (1 - Math.min(1, cv))));
      }

      // --- Entre semana vs fin de semana (normalizado por días disponibles) ---
      let wkend = 0;
      days.forEach(k => { const d = new Date(k + 'T00:00:00').getDay(); if (d === 0 || d === 6) wkend++; });
      const wkendRate = wkend / 2, wkdayRate = (n - wkend) / 5;
      const weekendLean = (wkendRate + wkdayRate) > 0
        ? Math.round(100 * wkendRate / (wkendRate + wkdayRate)) : 50;

      // --- Distribución de rachas ---
      const streaks = [];
      let cur = n > 0 ? 1 : 0;
      for (let i = 1; i < n; i++) {
        const d = Math.round((toT(days[i]) - toT(days[i - 1])) / 864e5);
        if (d === 1) cur++; else { streaks.push(cur); cur = 1; }
      }
      if (n > 0) streaks.push(cur);
      const streaks3 = streaks.filter(s => s >= 3).length;
      const avgStreak = streaks.length ? streaks.reduce((a, b) => a + b, 0) / streaks.length : 0;

      // --- Índice de fuerza del hábito (compuesto 0-100) ---
      // 35% consistencia + 25% camino a lo automático + 20% regularidad + 20% momentum
      const momentumNorm = ANALYTICS.momentumPct === null
        ? 50 : Math.max(0, Math.min(100, 50 + ANALYTICS.momentumPct / 2));
      const hsi = Math.round(
        0.35 * ANALYTICS.consistencyPct + 0.25 * ANALYTICS.habitPct +
        0.20 * regularity + 0.20 * momentumNorm);

      // --- Proyección de días activos del próximo mes (base + tendencia) ---
      const expNext30 = Math.max(0, Math.min(30, Math.round(ANALYTICS.last30 + trendPerMonth)));

      // --- Radiografía psicológica: estimaciones orientativas con tus datos ---
      // Autoeficacia (Bandura, 1977): su fuente nº1 son las "experiencias de dominio".
      const selfEfficacy = n === 0 ? 0 : Math.min(100, Math.round(
        20 + 0.5 * ANALYTICS.consistencyPct + Math.min(30, longestStreak * 2)));
      // Perseverancia tipo "grit" (Duckworth, 2007): volver tras las pausas.
      const grit = n === 0 ? 0 : Math.min(100, Math.round(
        Math.min(40, ANALYTICS.activeDays) + streaks3 * 10 +
        (gaps.length === 0 ? 20 : avgGap <= 2 ? 20 : avgGap <= 4 ? 10 : 0)));
      // Identidad (Oyserman / James Clear): cada sesión es un "voto" por quien eliges ser.
      const identity = Math.min(100, Math.round(totalSessions * 2));

      return { trendPerMonth, weeksTracked, avgGap, gapsCount: gaps.length, regularity,
               weekendLean, streaks3, avgStreak, hsi, expNext30,
               selfEfficacy, grit, identity };
    })();

    // =======================================================
    // 8) YO FUTURO — proyección a partir del ritmo actual
    //    + "Tú contra ti": mente / corazón / cuerpo
    // =======================================================
    const PROJECT_KEYS = ['read', 'trained', 'meditated', 'worked'];
    function projectMinutes(days) {
      const out = {};
      PROJECT_KEYS.forEach(key => {
        const dailyRate = timeSpent[key] / daysSinceStart;
        out[key] = timeSpent[key] + dailyRate * days;
      });
      return out;
    }
    function periodLabel(days) {
      if (days === 30) return '30 días';
      if (days === 365) return '1 año';
      return `${days} días`;
    }

    const YVY_ZONES = {
      mente: {
        title: 'Mente',

            <p class="yvy-text">Tu cerebro cambia físicamente con lo que repites — a esto la neurociencia lo llama <strong>neuroplasticidad</strong>, y no es una metáfora: Draganski y colegas (Nature, 2004) escanearon a personas aprendiendo una habilidad nueva y vieron crecer su materia gris en semanas; Eleanor Maguire (UCL, 2000) encontró hipocampos más desarrollados en taxistas de Londres tras años memorizando la ciudad. Cada hora de lectura suma a lo que el estudio Rush Memory and Aging (Wilson et al.) llama <em>reserva cognitiva</em>: quienes mantienen más actividad mental muestran un deterioro de memoria significativamente más lento. Cada sesión de meditación, según el trabajo de Sara Lazar en Harvard, se asocia con más densidad de materia gris en las zonas ligadas a la atención y la regulación emocional. Y cada hora de trabajo enfocado es lo que Anders Ericsson llamaba <em>práctica deliberada</em>: el camino más fiable hacia la maestría.</p>
            <p class="yvy-text">Tus datos: tu día más productivo suele ser el <strong>${ANALYTICS.bestDow}</strong>, y llevas un ${ANALYTICS.habitPct}% del camino hacia los 66 días que, de media, tarda un hábito en volverse automático (Lally et al., 2010).</p>
            <p class="yvy-text">Dos hallazgos más juegan a tu favor. Carol Dweck (Stanford) demostró que creer que las capacidades se entrenan — la <em>mentalidad de crecimiento</em> — cambia cómo respondes al error: deja de ser un veredicto y pasa a ser información; tus ${ADV.streaks3} racha${ADV.streaks3 === 1 ? '' : 's'} de 3+ días son la versión conductual de esa creencia. Y Mihaly Csikszentmihalyi documentó que el estado de <em>flow</em> — la concentración total y placentera — no aparece por azar: llega cuando el reto y la habilidad crecen juntos, algo que solo ocurre con práctica acumulada como la que estás registrando.</p>
            <p class="yvy-text">Hoy llevas ${mindNow.toFixed(1)} horas de mente entrenada. Si mantienes tu ritmo, dentro de ${periodLabel(period)} serán <strong>${mindProj.toFixed(1)} horas</strong> (${growth >= 0 ? '+' : ''}${growth}%). Ese es el cerebro que estás construyendo, sesión a sesión.</p>
          `;
        }
      },
      corazon: {
        title: 'Corazón',
        render(period) {
          if (totalSessions === 0) {
            return `<div class="yvy-panel-title">Corazón</div><p class="yvy-empty">Todavía no hay sesiones registradas. Tu corazón — y tu legado — empiezan con la primera.</p>`;
          }
          const rate = totalSessions / daysSinceStart;
          const projSessions = Math.round(totalSessions + rate * period);
          const reasonBlock = (profileInfo.reason && profileInfo.reason.trim())
            ? `<p class="yvy-text yvy-quote">&ldquo;${escapeHtml(profileInfo.reason)}&rdquo;</p>`
            : '';
          return `
            <div class="yvy-panel-title">Corazón</div>
            <div class="yvy-metric-row">
              <div class="yvy-metric"><span class="yvy-metric-num">${currentStreak}</span><span class="yvy-metric-label">días de racha actual</span></div>
              <div class="yvy-metric"><span class="yvy-metric-num">${projSessions}</span><span class="yvy-metric-label">sesiones estimadas en ${periodLabel(period)}</span></div>
            </div>
            <p class="yvy-text">El investigador Hal Hershfield (UCLA) descubrió que las personas que se sienten más conectadas con quienes serán en el futuro toman mejores decisiones hoy: cuidan más su salud, ahorran más, se rinden menos. Katy Milkman y su equipo (Wharton) documentaron además el <em>efecto de borrón y cuenta nueva</em>: los inicios — un lunes, un mes nuevo, un día después de un tropiezo — son ventanas donde retomar cuesta menos. Y la psicóloga Daphna Oyserman demostró que la motivación más duradera es la <em>basada en identidad</em>: no "tengo que entrenar", sino "soy alguien que entrena". Cada registro en FOCUS es exactamente eso.</p>
            <p class="yvy-text">Tus datos: consistencia del <strong>${ANALYTICS.consistencyPct}%</strong> (${ANALYTICS.activeDays} de ${daysSinceStart} días activos)${ANALYTICS.momentumPct !== null ? ` y un momentum de ${ANALYTICS.momentumPct >= 0 ? '+' : ''}${ANALYTICS.momentumPct}% frente al mes anterior` : ''}. Tu autoeficacia estimada es de ${ADV.selfEfficacy}/100 y tu perseverancia de ${ADV.grit}/100.</p>
            <p class="yvy-text">Sobre esas dos cifras: Albert Bandura (1977) demostró que la creencia "soy capaz" no nace de frases motivacionales sino de <em>experiencias de dominio</em> — cada sesión completada es un ladrillo de esa creencia. Y Angela Duckworth (2007) midió que el <em>grit</em> — la perseverancia sostenida — predice quién termina lo que empieza mejor que el talento o el CI: en tus datos se ve en lo rápido que vuelves después de cada pausa.</p>
            <p class="yvy-text">El escritor David Brooks distingue entre las "virtudes de currículum" — lo que logras — y las "virtudes de elogio fúnebre" — quién eres, lo que la gente recordará de ti. Tus ${totalSessions} sesiones y tu racha de ${longestStreak} días no son solo números: son la prueba, día a día, de que estás eligiendo a alguien de quien sentirte orgulloso.</p>
            ${reasonBlock}
            <p class="yvy-text">Si sigues así, dentro de ${periodLabel(period)} habrás sumado unas ${Math.max(projSessions - totalSessions, 0)} sesiones más. Tu legado no es un día perfecto — es la suma de todos los días en los que apareciste.</p>
          `;

      cuerpo: {

          }
          const bodyProjH = proj.trained / 60;
          const weeksNow = (timeSpent.trained / 150).toFixed(1);
          const weeksProj = (proj.trained / 150).toFixed(1);
          return `
            <div class="yvy-panel-title">Cuerpo</div>
            <div class="yvy-metric-row">
              <div class="yvy-metric"><span class="yvy-metric-num">${bodyProjH.toFixed(1)}h</span><span class="yvy-metric-label">entrenadas en ${periodLabel(period)}</span></div>
              <div class="yvy-metric"><span class="yvy-metric-num">${weeksProj}</span><span class="yvy-metric-label">semanas OMS acumuladas</span></div>
            </div>
            <p class="yvy-text">La Organización Mundial de la Salud recomienda al menos 150 minutos semanales de actividad moderada. Con tus ${Math.round(timeSpent.trained)} minutos registrados ya llevas el equivalente a ${weeksNow} semanas de esa recomendación.</p>
            <p class="yvy-text">El neurocientífico John Ratey (autor de <em>Spark</em>) documentó cómo el ejercicio eleva el BDNF, una proteína que ayuda a tu cerebro a crear nuevas conexiones: entrenar tu cuerpo también entrena tu mente. Kirk Erickson y colegas (PNAS, 2011) lo comprobaron en un ensayo controlado: un año de ejercicio aeróbico regular <em>aumentó</em> el tamaño del hipocampo, revirtiendo en la práctica uno o dos años de envejecimiento cerebral. El histórico Harvard Alumni Health Study (Paffenbarger et al.) fue de los primeros en demostrar que la actividad física regular se asocia con una vida más larga, y el metaanálisis de Arem et al. (JAMA Internal Medicine, 2015, con más de 660.000 personas) precisó la dosis: los mayores beneficios llegan justo en el rango de la recomendación de la OMS que estás acumulando.</p>
            <p class="yvy-text">Tus datos: tu mayor hueco sin actividad ha sido de ${ANALYTICS.longestGap} día${ANALYTICS.longestGap === 1 ? '' : 's'}${ANALYTICS.longestGap <= 2 ? ' — prácticamente sin pausas' : ''}. La regla que protege tu progreso: nunca dos días seguidos en blanco.</p>
            <p class="yvy-text">El cuerpo también devuelve el favor a la cabeza: Chekroud y colegas (The Lancet Psychiatry, 2018) analizaron a 1,2 millones de personas y encontraron que quienes hacen ejercicio reportan bastantes menos días de mala salud mental al mes, con el mayor beneficio en torno a 3-5 sesiones semanales de ~45 minutos — un objetivo perfectamente alcanzable a tu ritmo. Y la investigación de Sabine Sonnentag sobre <em>recuperación</em> muestra que el descanso de calidad no es lo contrario del progreso, sino la fase donde se consolida: los días sin entrenar también trabajan para ti.</p>
            <p class="yvy-text">Si mantienes tu ritmo, dentro de ${periodLabel(period)} tendrás <strong>${bodyProjH.toFixed(1)} horas</strong> entrenadas — unas ${weeksProj} semanas de la recomendación de la OMS. Ese es el cuerpo que estás construyendo.</p>
          `;
        }
      }
    };

    let futurePeriod = 90;
    let activeYvyZone = null;
    let yvyInstance = null;

    function renderYvyPanel(proj) {

    function renderFuture() {

      const projTotalMinutes = Object.values(proj).reduce((a, b) => a + b, 0);
      const projTotalHours = projTotalMinutes / 60;
      const growthPct = totalMinutes > 0 ? Math.round(((projTotalMinutes - totalMinutes) / totalMinutes) * 100) : 0;
      const projDominant = identityCategories.reduce((max, c) => (proj[c.key] > proj[max.key] ? c : max), identityCategories[0]);

      const dailyRateAll = totalMinutes / daysSinceStart;
      const scenarioH = mult => ((totalMinutes + dailyRateAll * mult * futurePeriod) / 60).toFixed(0);
      const momentumHtml = ANALYTICS.momentumPct === null
        ? `<div class="insight-num">—</div><div class="insight-label">Momentum 30 días</div><div class="insight-sub">Aún no hay 60 días de historial para comparar. Sigue registrando.</div>`
        : `<div class="insight-num"><span class="${ANALYTICS.momentumPct >= 0 ? 'up' : 'down'}">${ANALYTICS.momentumPct >= 0 ? '+' : ''}${ANALYTICS.momentumPct}%</span></div><div class="insight-label">Momentum 30 días</div><div class="insight-sub">${ANALYTICS.last30} días activos en el último mes frente a ${ANALYTICS.prev30} en el anterior. ${ANALYTICS.momentumPct >= 0 ? 'Estás acelerando — el "principio del progreso" (Amabile y Kramer, Harvard) predice que esto retroalimenta tu motivación.' : 'Vas algo más lento que el mes pasado — no es una crisis, es información. Un día pequeño hoy invierte la tendencia.'}</div>`;

          const projSessionsP = Math.round(totalSessions + (totalSessions / daysSinceStart) * futurePeriod);
          const projActiveDays = Math.min(futurePeriod, Math.round((ANALYTICS.activeDays / daysSinceStart) * futurePeriod)) + ANALYTICS.activeDays;

            : null;
          const portrait = `Es <strong>${fdStr}</strong>. Te levantas y no negocias contigo: lo que hace ${futurePeriod} días requería fuerza de voluntad ${daysSinceStart + futurePeriod >= 66 ? 'ya funciona en piloto automático — cruzaste la frontera de los 66 días' + (automaticBy ? ` alrededor del ${automaticBy}` : '') : 'cada vez pide menos esfuerzo'}. Acumulas <strong>${projTotalHours.toFixed(0)} horas</strong> invertidas en ti: ${projMindH}h de mente${Number(projBooks) > 0 ? ` (el equivalente a ${projBooks} libros)` : ''} y ${projTrainH}h de cuerpo. Tu historial marca ~${projSessionsP} sesiones en ~${projActiveDays} días activos, y sigues siendo, cada vez con más derecho, ${projDominant.phrase}. La persona que hoy lee esto es el borrador; esa es la versión firmada.`;

          const dropLine1 = `Las ${projTotalHours.toFixed(0)} horas se quedan en ${totalHours.toFixed(1)} — las ${(projTotalHours - totalHours).toFixed(0)} restantes no existirán.`;

          const dropLine3 = `Tu récord queda en ${longestStreak} día${longestStreak === 1 ? '' : 's'} para siempre — la racha 2.0 nunca llega a nacer.`;
          // ---- Carta de tu yo futuro ----
          const reasonRef = (profileInfo.reason && profileInfo.reason.trim())
            ? `Aún recuerdo por qué empezamos: &ldquo;${escapeHtml(profileInfo.reason)}&rdquo;. Tenías razón.`
            : `Ni siquiera escribiste todavía el porqué — hazlo hoy en la pestaña "¿Por qué?": yo lo leo a menudo.`;
          return `
        <div class="portrait-card">
          <div class="portrait-date">Retrato · dentro de ${periodLabel(futurePeriod)}</div>

        <div class="diverge-grid">
          <div class="diverge-card keep">
            <div class="diverge-title">Si sigues como hoy</div>

        : `Necesito al menos 3 semanas de historial para calcular tu línea de tendencia con regresión (llevas ${ADV.weeksTracked}). Cada día que registres afina el cálculo.`,
      hsi: () => `Tu índice de fuerza del hábito es <strong>${ADV.hsi}/100</strong> — un compuesto de consistencia (${ANALYTICS.consistencyPct}%), automatización (${ANALYTICS.habitPct}%), regularidad (${ADV.regularity}/100) y momentum. Está inspirado en el Self-Report Habit Index de Verplanken y Orbell (2003), el cuestionario estándar en la investigación de hábitos. ${ADV.hsi >= 70 ? 'Un hábito así de asentado sobrevive a semanas malas: ya no depende de la motivación diaria.' : ADV.hsi >= 40 ? 'Está en construcción sólida — la palanca más eficaz ahora es la regularidad: mismo momento, mismo lugar.' : 'Aún es una planta joven: riega con versiones mínimas diarias antes que con sesiones heroicas sueltas.'}`,
      selfefficacy: () => `Bandura pasó décadas demostrando que la creencia "soy capaz" no se fabrica con frases — se fabrica con <em>experiencias de dominio</em>: pruebas de que ya lo hiciste. Tú tienes ${totalSessions} ${totalSessions === 1 ? 'prueba' : 'pruebas'}, una racha récord de ${longestStreak} días y una autoeficacia estimada de ${ADV.selfEfficacy}/100 según tus propios registros. No hace falta que te lo creas hoy: los datos ya lo creen por ti. Haz la sesión mínima y súmale una prueba más al expediente.`,
      mindset: () => `Carol Dweck (Stanford) llamó <em>mentalidad fija</em> a tratar cada tropiezo como un veredicto sobre lo que eres, y <em>mentalidad de crecimiento</em> a tratarlo como información sobre lo que aún estás entrenando. Sus estudios muestran que la segunda predice más aprendizaje y persistencia — y se entrena. Tu historial es el argumento: ${ANALYTICS.activeDays} días activos y ${ADV.streaks3} racha${ADV.streaks3 === 1 ? '' : 's'} de 3+ días no los hace alguien que "no vale": los hace alguien en mitad del entrenamiento.`,
      grit: () => `Duckworth define el grit como pasión + perseverancia a largo plazo, y encontró que predice quién termina — en West Point, en el Spelling Bee — mejor que el talento. La señal clave no es no caerse: es cuánto tardas en volver. Tus números: ${ADV.gapsCount === 0 ? 'todavía cero pausas' : `vuelves de media en ${ADV.avgGap.toFixed(1)} día${ADV.avgGap.toFixed(1) === '1.0' ? '' : 's'} tras cada pausa`}, ${ADV.streaks3} racha${ADV.streaks3 === 1 ? '' : 's'} de 3+ días y una perseverancia estimada de ${ADV.grit}/100. Eso ya es grit medible, no una sensación.`,
      identity: () => `Sí, y es la parte más importante. Daphna Oyserman demostró que la motivación duradera es la <em>basada en identidad</em>: no "tengo que hacer X" sino "soy alguien que hace X". Cada sesión registrada es un voto por esa identidad — llevas <strong>${totalSessions} voto${totalSessions === 1 ? '' : 's'}</strong>, la mayoría a favor de ${dominant.phrase}. Con ${ADV.identity}/100 en el índice de identidad, la pregunta ya no es si está cambiando quién eres: es hacia quién estás votando esta semana.`,
      weekend: () => `Ajustado por días disponibles (5 laborales frente a 2 de finde), tu inclinación al fin de semana es del <strong>${ADV.weekendLean}%</strong>. ${ADV.weekendLean > 55 ? 'Eres de fin de semana: la semana laboral es tu terreno frágil. Un micro-hábito fijo de 10 minutos un día laborable repartiría la carga y protegería la racha.' : ADV.weekendLean < 45 ? 'Eres de entre semana: cuando llega el sábado se te descoloca el contexto (Wood y Neal demostraron que los hábitos viven pegados al contexto). Un ancla fija — sábado tras el desayuno, por ejemplo — suele resolverlo.' : 'Reparto casi perfecto entre semana y finde: es el patrón más resistente a vacaciones y cambios de rutina.'}`,
      regularity: () => `Midiendo la variabilidad de los intervalos entre tus días activos, tu regularidad es de <strong>${ADV.regularity}/100</strong>. ${ADV.regularity >= 70 ? 'Ritmo de metrónomo: tus sesiones llegan a intervalos muy estables, que es exactamente como se ancla un hábito al contexto según Wood y Neal.' : 'Funcionas a rachas: etapas densas y luego pausas. Para estabilizarlo, Gollwitzer propone las "intenciones de implementación": decide por adelantado el cuándo y el dónde ("después de comer, 10 minutos de X") — en sus estudios eso duplica el cumplimiento.'} Tu racha media es de ${ADV.avgStreak.toFixed(1)} días.`,
      recovery: () => ADV.gapsCount === 0
        ? `Todavía no has tenido ninguna pausa que medir — rebote perfecto por definición. Cuando llegue (llegará, y no pasa nada), lo que importará es una sola cosa: que la pausa no se encadene. Regla de oro: nunca dos días seguidos en blanco.`
        : `Has tenido ${ADV.gapsCount} pausa${ADV.gapsCount === 1 ? '' : 's'} y vuelves de media en <strong>${ADV.avgGap.toFixed(1)} día${ADV.avgGap.toFixed(1) === '1.0' ? '' : 's'}</strong>. ${ADV.avgGap <= 2 ? 'Ese rebote rápido es la marca del grit según Duckworth — caerse no puntúa, volver sí.' : 'Ahí está tu mayor margen de mejora: acortar el regreso. El "efecto de borrón y cuenta nueva" de Milkman ayuda — usa cualquier inicio (un lunes, un día 1) como puerta de reentrada, con una sesión mínima.'}`,
      nextMonth: () => ADV.weeksTracked >= 3
        ? `Proyección para los próximos 30 días combinando tu base reciente (${ANALYTICS.last30} días activos el último mes) con tu tendencia (${ADV.trendPerMonth >= 0 ? '+' : ''}${ADV.trendPerMonth.toFixed(1)} días/mes): <strong>~${ADV.expNext30} días activos</strong>, que a tu ritmo medio serían unas ${((totalMinutes / daysSinceStart) * ADV.expNext30 / 60).toFixed(0)} horas más. No es una promesa — es hacia dónde apunta tu comportamiento si no tocas nada. Si quieres superarlo, la palanca más barata sigue siendo tu ${ANALYTICS.worstDow}.`
        : `Con menos de 3 semanas de historial mi proyección sería humo. Lo que sí puedo decirte: tu línea base actual son ${ANALYTICS.last30} días activos en los últimos 30 — el objetivo del mes que viene es simplemente superarla.`,
      goal: () => `Locke y Latham, tras 35 años de investigación sobre fijación de metas, lo resumen en dos condiciones: <strong>específica</strong> y <strong>exigente pero alcanzable</strong> — las metas vagas ("hacer más") rinden sistemáticamente peor. Con tus datos, una meta bien calibrada sería: ${ADV.expNext30 > 0 ? `${Math.min(30, ADV.expNext30 + 2)} días activos el próximo mes (tu proyección es ${ADV.expNext30}, así que exige sin romper)` : `superar tus ${ANALYTICS.last30} días activos del último mes`}, con la sesión clave los ${ANALYTICS.bestDow} y la versión de 10 minutos los ${ANALYTICS.worstDow}. Y por escrito: el estudio de Gail Matthews muestra que escribir la meta dispara su cumplimiento.`,
      flow: () => `Csikszentmihalyi estudió durante décadas el estado de <em>flow</em> — esa concentración total en la que el tiempo desaparece — y encontró sus condiciones: objetivo claro, feedback inmediato y un reto a la altura de tu habilidad. Para entrar más fácil: (1) define qué vas a conseguir en la sesión antes de empezarla, (2) quita el móvil de la vista — el mero hecho de verlo drena atención (Ward et al., 2017, el efecto "brain drain") — y (3) empieza por 10 minutos: el arranque es la parte más cara. Tu mejor ventana estadística es el ${ANALYTICS.bestDow}.`,
      compare: () => `Festinger describió en 1954 la comparación social: nos medimos con otros por defecto, sobre todo cuando no tenemos una vara propia. FOCUS existe para darte esa vara: la única comparación con señal de verdad es <strong>tú contra ti</strong>. Y ahí los datos son claros: ${totalHours.toFixed(1)} horas acumuladas, ${ANALYTICS.consistencyPct}% de consistencia${ANALYTICS.momentumPct !== null ? `, ${ANALYTICS.momentumPct >= 0 ? '+' : ''}${ANALYTICS.momentumPct}% de momentum` : ''}. La persona de hace ${daysSinceStart} días no tenía nada de esto. Esa es tu liga.`,
      perfect: () => `Amabile y Kramer analizaron 12.000 diarios de trabajo y encontraron que lo que más sostiene la motivación no son los grandes logros: son las <em>pequeñas victorias</em> visibles. El perfeccionismo hace trampa — compara tu día real con un estándar imaginario y siempre pierde el real. Tus números no son imaginarios: ${totalSessions} sesiones, ${totalHours.toFixed(1)} horas, ${ADV.streaks3} racha${ADV.streaks3 === 1 ? '' : 's'} de 3+ días. "Suficiente" no es un sentimiento: es un registro, y el tuyo existe.`,
      overwhelmed: () => `Primero: agobiarse con muchas cosas a la vez es una respuesta normal, no un fallo tuyo. La salida práctica casi nunca es hacer más — es reducir la apuesta de hoy a una sola acción mínima (BJ Fogg): 5 minutos de lo más fácil, y considerar el día ganado. Tu racha no exige heroísmo, solo presencia${currentStreak > 0 ? ` — llevas ${currentStreak} día${currentStreak === 1 ? '' : 's'} y hoy basta con no romperla` : ''}. Y si el agobio va más allá de los hábitos y se te hace grande de verdad, hablarlo con alguien de confianza o con un profesional no es rendirse: es otra forma de cuidar el legado.`,
      sleep: () => `Sí — probablemente más que casi todo lo demás. La investigación de Matthew Walker (Berkeley) muestra que durante el sueño se consolida lo aprendido en el día (la memoria se "guarda" durmiendo) y se recupera el músculo entrenado; dormir poco degrada atención, ánimo y autocontrol, justo los recursos que tus hábitos necesitan. Traducción práctica: una hora más de sueño suele rendir más que una hora más de sesión. Si tu ${ANALYTICS.worstDow} flojea, mira primero cómo dormiste la noche anterior.`,
      celebrate: () => {
        const wins = [];
        if (longestStreak >= 3) wins.push(`una racha récord de ${longestStreak} días`);
        if (totalHours >= 1) wins.push(`${totalHours.toFixed(1)} horas acumuladas`);
        if (ANALYTICS.activeDays >= 7) wins.push(`${ANALYTICS.activeDays} días activos`);
        if (ADV.hsi >= 40) wins.push(`un índice de fuerza del hábito de ${ADV.hsi}/100`);
        return wins.length
          ? `Sí, y celebrarlo no es un capricho: BJ Fogg (Stanford) demostró que la emoción positiva justo después de la acción es lo que cablea el hábito — "las emociones crean hábitos, no la repetición sola". Sobre la mesa tienes ${wins.join(', ')}. Elige una, reconócetela en voz alta, y mañana seguimos.`
          : `Todavía es pronto para medallas grandes, pero la primera ya está disponible: la sesión de hoy. Fogg demostró que celebrar en pequeño justo después de actuar es lo que fija el hábito — así que hazla, aunque sean 5 minutos, y date el reconocimiento.`;
      },
    };
    // Intérprete de texto libre: mapea lo que escribes a la consulta más cercana
    const COMPANION_KEYWORDS = {
      quit: ['rendir', 'dejar', 'abandon', 'tirar la toalla', 'no puedo mas', 'no puedo más'],
      streakBroken: ['roto', 'rompi', 'rompí', 'perdido la racha', 'perdí la racha', 'fallado', 'fallé', 'falle'],
      noMotivation: ['ganas', 'motivacion', 'motivación', 'pereza', 'vago', 'cansado de esto', 'desmotiv'],
      bestDay: ['mejor dia', 'mejor día', 'que dia', 'qué día', 'dia de la semana', 'día de la semana'],
      weakSpot: ['flojeando', 'flojo', 'peor', 'debil', 'débil', 'descuid', 'fallando'],
      lastMonth: ['mes pasado', 'ultimo mes', 'último mes', 'comparado', 'antes', 'progreso este mes'],
      weekPlan: ['plan', 'semana', 'organiza', 'horario', 'rutina'],
      automatic: ['automatico', 'automático', '66', 'habito', 'hábito', 'cuanto falta', 'cuánto falta'],
      balance: ['equilibr', 'balance', 'centrado', 'obsesion', 'obsesión', 'variedad'],
      rest: ['descans', 'culpa', 'parar', 'pausa', 'vacaciones', 'dia libre', 'día libre'],
      science: ['ciencia', 'estudio', 'racha', 'investigacion', 'investigación', 'psicolog'],
      improving: ['mejorando', 'mejoro', 'avanzo', 'avanzando', 'sirve de algo', 'vale la pena', 'merece la pena'],
      why: ['por que empece', 'por qué empecé', 'porque empece', 'mi porque', 'mi porqué', 'proposito', 'propósito', 'razon', 'razón'],
      future: ['yo futuro', 'futuro yo', 'consejo', 'que deberia saber', 'qué debería saber'],
      trend: ['tendencia', 'a mejor', 'a peor', 'mejorando o empeorando', 'regresion', 'regresión', 'pendiente'],
      hsi: ['fuerte', 'fuerza del habito', 'fuerza del hábito', 'indice', 'índice', 'consolidado', 'solido', 'sólido'],
      selfefficacy: ['capaz', 'no puedo con esto', 'autoeficacia', 'no me creo', 'incapaz', 'no sirvo'],
      mindset: ['no valgo', 'inutil', 'inútil', 'mentalidad', 'fracaso', 'fracasado', 'no soy bueno', 'malo en esto'],
      grit: ['constancia', 'perseveran', 'grit', 'disciplina', 'fuerza de voluntad'],
      identity: ['quien soy', 'quién soy', 'identidad', 'cambiando', 'convirtiendo', 'persona que'],
      weekend: ['finde', 'fin de semana', 'entre semana', 'laborable', 'sabado', 'sábado', 'domingo'],
      regularity: ['regular', 'ritmo', 'a rachas', 'intervalos', 'constante', 'irregular'],
      recovery: ['volver', 'recupera', 'rebote', 'pausa', 'cuanto tardo', 'cuánto tardo', 'retomar'],
      nextMonth: ['mes que viene', 'proximo mes', 'próximo mes', 'que me espera', 'qué me espera', 'prediccion', 'predicción', 'proyeccion', 'proyección'],
      goal: ['meta', 'objetivo', 'proponerme', 'ponerme una', 'smart'],
      flow: ['concentra', 'flow', 'distraigo', 'distraccion', 'distracción', 'foco', 'atencion', 'atención', 'movil', 'móvil'],
      compare: ['comparo', 'comparar', 'los demas', 'los demás', 'otros', 'envidia', 'redes sociales'],
      perfect: ['suficiente', 'perfecto', 'perfeccion', 'perfección', 'nunca es', 'no llego', 'exigente'],
      overwhelmed: ['agobiado', 'agobio', 'estres', 'estrés', 'ansiedad', 'saturado', 'demasiado', 'no doy abasto', 'abrumado'],
      sleep: ['sueño', 'dormir', 'duermo', 'descanso nocturno', 'trasnochar', 'insomnio'],
      celebrate: ['celebrar', 'logro', 'orgulloso', 'conseguido', 'medalla', 'premio']
    };
    function matchPrompt(text) {
      const t = text.toLowerCase();
      for (const [key, words] of Object.entries(COMPANION_KEYWORDS)) {
        if (words.some(w => t.includes(w))) return key;
      }
      return null;
    }
    function genericReply() {
      const pool = [
        "Esa se me escapa todavía — pero ahora entiendo muchas más preguntas que antes. Prueba a reformularla, o toca una de las consultas de abajo: todas usan tus datos reales.",
        "No tengo una respuesta libre para eso aún. Si me hablas de tu racha, tu motivación, tu plan semanal o tus puntos flojos, te contesto con tus números.",
        "Esa es una conversación más grande de la que puedo tener todavía. Las consultas de abajo son un buen punto de partida — están construidas con tus datos reales."
      ];
      return pool[Math.floor(Math.random() * pool.length)];
    }
    function renderCompanion() {
      const el = document.getElementById('companionContent');
      el.innerHTML = `
        <div class="companion-intro">Tu Mentor lee tus datos de FOCUS — sesiones, rachas, patrones semanales, tu "porqué" — y te responde con números reales y respaldo de la investigación en psicología. No opina: analiza. Elige una consulta o escribe la tuya.</div>
        <div class="companion-chat" id="companionChat">
          <div class="companion-bubble assistant">Aquí tu Mentor. He estado siguiendo tu camino: ${totalSessions} ${totalSessions === 1 ? 'sesión' : 'sesiones'}, una racha actual de ${currentStreak} días, sobre todo ${dominant.phrase}. ¿Qué tienes en mente?</div>
        </div>
        <div class="companion-prompts" id="companionPrompts">
          ${COMPANION_PROMPTS.map(p => `<button class="prompt-chip" data-key="${p.key}">${p.label}</button>`).join('')}
        </div>
        <div class="companion-input-row">
          <input type="text" id="companionInput" placeholder="Pregúntale a tu Mentor...">
          <button id="companionSendBtn">Enviar</button>
        </div>
      `;
      const chat = document.getElementById('companionChat');
      function pushBubble(role, text) {
        const div = document.createElement('div');
        div.className = `companion-bubble ${role}`;
        div.innerHTML = text;
        chat.appendChild(div);
        chat.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }
      document.getElementById('companionPrompts').addEventListener('click', (e) => {
        const btn = e.target.closest('.prompt-chip');
        if (!btn) return;
        const prompt = COMPANION_PROMPTS.find(p => p.key === btn.dataset.key);
        pushBubble('user', escapeHtml(prompt.label));
        setTimeout(() => pushBubble('assistant', COMPANION_RESPONSES[prompt.key]()), 350);
      });
      function handleSend() {
        const input = document.getElementById('companionInput');
        const val = input.value.trim();
        if (!val) return;
        pushBubble('user', escapeHtml(val));
        input.value = '';
        const matched = matchPrompt(val);
        setTimeout(() => pushBubble('assistant', matched ? COMPANION_RESPONSES[matched]() : genericReply()), 350);
      }
      document.getElementById('companionSendBtn').addEventListener('click', handleSend);
      document.getElementById('companionInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleSend();
      });
    }
    renderCompanion();

    /* -- Transición dinámica entre páginas -- */
    document.querySelectorAll('.nav-item a, .header h1 a').forEach(link => {
      link.addEventListener('click', (e) => {
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        e.preventDefault();
        document.body.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
        document.body.style.opacity = '0';
        document.body.style.transform = 'translateY(-6px)';
        setTimeout(() => { window.location.href = href; }, 200);
      });
    });
  </script>
</body>
</html>
