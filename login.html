<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Focus - Log in</title>

  <!-- PWA: manifest + soporte "Añadir a pantalla de inicio" en iOS -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#100F19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Focus">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  >

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #1f1f1f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background-color: #000;
      text-align: center;
      padding: 2.5rem 1rem;
    }

    /* =====================================================
       TrueFocus — port a vanilla JS/CSS del componente React
       (palabras desenfocadas + marco de esquinas animado)
       ===================================================== */
    .focus-container {
      position: relative;
      display: flex;
      gap: 0.6em;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      font-size: clamp(2.2rem, 8vw, 3rem);
      font-weight: 900;
      line-height: 1.2;
    }

    .focus-word {
      position: relative;
      color: #fff;
      cursor: default;
      transition: filter 0.5s ease;
    }

    .focus-frame {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      box-sizing: content-box;
      border: none;
      transition:
        transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        width 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        height 0.5s cubic-bezier(0.22, 1, 0.36, 1),
        opacity 0.3s ease;
    }

    .focus-frame .corner {
      position: absolute;
      width: 1rem;
      height: 1rem;
      border: 3px solid var(--border-color, #57e32c);
      filter: drop-shadow(0 0 4px var(--glow-color, rgba(87, 227, 44, 0.6)));
      border-radius: 3px;
      transition: none;
    }
    .focus-frame .corner.top-left {
      top: -10px; left: -10px;
      border-right: none; border-bottom: none;
    }
    .focus-frame .corner.top-right {
      top: -10px; right: -10px;
      border-left: none; border-bottom: none;
    }
    .focus-frame .corner.bottom-left {
      bottom: -10px; left: -10px;
      border-right: none; border-top: none;
    }
    .focus-frame .corner.bottom-right {
      bottom: -10px; right: -10px;
      border-left: none; border-top: none;
    }

    .auth-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    .auth-box {
      background-color: #2c2c2c;
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    .auth-box h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .auth-box label {
      font-size: 0.9rem;
      display: block;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }

    .auth-box input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 8px;
      border: none;
      outline: none;
      background-color: #1f1f1f;
      color: #fff;
      font-size: 1rem;
    }

    .auth-box button {
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.8rem;
      background-color: #57e32c;
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .auth-box button:hover { background-color: #45c229; }

    /* Botón de Google */
    .social-divider {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1.5rem 0 0;
      color: #666;
      font-size: 0.8rem;
    }
    .social-divider::before,
    .social-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background-color: #3a3a3a;
    }

    .auth-box button.social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1rem;
      background-color: #1f1f1f;
      color: #fff;
      border: 1px solid #3a3a3a;
      font-weight: 600;
      font-size: 0.95rem;
    }
    .auth-box button.social-btn:hover { background-color: #2a2a2a; }

    .switch-mode {
      text-align: center;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #aaa;
    }
    .switch-mode a {
      color: #57e32c;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .switch-mode a:hover { text-decoration: underline; }

    #errorMsg {
      color: #ff6b6b;
      font-size: 0.85rem;
      margin-top: 1rem;
      text-align: center;
      min-height: 1rem;
    }
  </style>
</head>
<body>

  <header class="header">
    <h1 class="focus-container" id="trueFocus" aria-label="Focus."></h1>
  </header>

  <div class="auth-container">
    <div class="auth-box">
      <h2 id="formTitle">Log in to your account</h2>

      <form id="authForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required minlength="6">

        <button type="submit" id="submitBtn">Log in</button>
      </form>

      <div class="social-divider"><span>o continúa con</span></div>

      <button type="button" class="social-btn" id="googleBtn">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M23.5 12.3c0-.9-.1-1.5-.3-2.2H12v4.1h6.5c-.1 1.1-.8 2.7-2.4 3.8l3.7 2.9c2.2-2.1 3.7-5.1 3.7-8.6z"/><path fill="#34A853" d="M12 24c3.2 0 5.9-1.1 7.9-2.9l-3.7-2.9c-1 .7-2.4 1.2-4.2 1.2-3.2 0-5.9-2.1-6.8-5.1L1.3 17.2C3.3 21.2 7.3 24 12 24z"/><path fill="#FBBC05" d="M5.2 14.3c-.2-.7-.4-1.5-.4-2.3s.1-1.6.4-2.3L1.3 6.8C.5 8.4 0 10.1 0 12s.5 3.6 1.3 5.2l3.9-2.9z"/><path fill="#EA4335" d="M12 4.7c1.8 0 3 .8 3.7 1.4l3.3-3.2C17.9 1.1 15.2 0 12 0 7.3 0 3.3 2.8 1.3 6.8l3.9 2.9c.9-3 3.6-5 6.8-5z"/></svg>
        Google
      </button>

      <p id="errorMsg"></p>

      <p class="switch-mode">
        <span id="switchText">Don't have an account?</span>
        <a id="switchLink">Sign up</a>
      </p>
    </div>
  </div>

  <script>
    // =====================================================
    // TrueFocus (vanilla) — mismo comportamiento que el
    // componente React: cada palabra se enfoca por turnos,
    // el resto se desenfoca, y un marco de esquinas con glow
    // viaja hasta la palabra activa.
    // =====================================================
    (function () {
      // --- Configuración (equivalente a las props del componente) ---
      const SENTENCE = "Just Focus.";  // cámbialo por el texto que quieras
      const SEPARATOR = " ";
      const BLUR_AMOUNT = 5;                         // px de desenfoque
      const BORDER_COLOR = "#57e32c";                // verde de la marca
      const GLOW_COLOR = "rgba(87, 227, 44, 0.6)";
      const ANIMATION_DURATION = 0.5;                // s
      const PAUSE_BETWEEN = 1;                       // s

      const container = document.getElementById("trueFocus");
      const words = SENTENCE.split(SEPARATOR);
      let currentIndex = 0;

      // Palabras
      const wordEls = words.map((word) => {
        const span = document.createElement("span");
        span.className = "focus-word";
        span.textContent = word;
        span.style.transition = `filter ${ANIMATION_DURATION}s ease`;
        container.appendChild(span);
        return span;
      });

      // Marco de esquinas
      const frame = document.createElement("div");
      frame.className = "focus-frame";
      frame.style.setProperty("--border-color", BORDER_COLOR);
      frame.style.setProperty("--glow-color", GLOW_COLOR);
      frame.style.opacity = "0";
      ["top-left", "top-right", "bottom-left", "bottom-right"].forEach((pos) => {
        const c = document.createElement("span");
        c.className = `corner ${pos}`;
        frame.appendChild(c);
      });
      container.appendChild(frame);

      function applyFocus(index) {
        wordEls.forEach((el, i) => {
          el.style.filter = i === index ? "blur(0px)" : `blur(${BLUR_AMOUNT}px)`;
        });

        const parentRect = container.getBoundingClientRect();
        const activeRect = wordEls[index].getBoundingClientRect();
        frame.style.width = `${activeRect.width}px`;
        frame.style.height = `${activeRect.height}px`;
        frame.style.transform =
          `translate(${activeRect.left - parentRect.left}px, ${activeRect.top - parentRect.top}px)`;
        frame.style.opacity = "1";
      }

      // Primer posicionamiento cuando la fuente Inter ya está cargada
      // (si no, el marco se mediría con la fuente de sistema y quedaría torcido)
      const start = () => {
        applyFocus(currentIndex);
        setInterval(() => {
          currentIndex = (currentIndex + 1) % words.length;
          applyFocus(currentIndex);
        }, (ANIMATION_DURATION + PAUSE_BETWEEN) * 1000);
      };
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(start);
      } else {
        window.addEventListener("load", start);
      }

      // Reposicionar el marco si cambia el tamaño de la ventana / giro del móvil
      window.addEventListener("resize", () => applyFocus(currentIndex));
    })();
  </script>

  <script type="module">
    import { auth, loginWithGoogle } from "./firebase-init.js";
    import {
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Si ya hay sesión iniciada, decidimos a dónde va:
    // - usuario de contraseña SIN verificar -> verify-email.html
    // - resto -> directo a la app
    onAuthStateChanged(auth, (user) => {
      if (user) {
        const usaPassword = user.providerData.some(p => p.providerId === "password");
        if (usaPassword && !user.emailVerified) {
          window.location.href = "verify-email.html";
        } else {
          sessionStorage.setItem("focus-entry", "login");
          window.location.href = "index.html";
        }
      }
    });

    let mode = "login"; // "login" | "signup"

    const formTitle  = document.getElementById("formTitle");
    const authForm   = document.getElementById("authForm");
    const emailInput = document.getElementById("email");
    const passInput  = document.getElementById("password");
    const submitBtn  = document.getElementById("submitBtn");
    const errorMsg   = document.getElementById("errorMsg");
    const switchText = document.getElementById("switchText");
    const switchLink = document.getElementById("switchLink");

    function setMode(newMode) {
      mode = newMode;
      errorMsg.textContent = "";
      if (mode === "login") {
        formTitle.textContent = "Log in to your account";
        submitBtn.textContent = "Log in";
        switchText.textContent = "Don't have an account?";
        switchLink.textContent = "Sign up";
      } else {
        formTitle.textContent = "Create your account";
        submitBtn.textContent = "Sign up";
        switchText.textContent = "Already have an account?";
        switchLink.textContent = "Log in";
      }
    }

    switchLink.addEventListener("click", () => {
      setMode(mode === "login" ? "signup" : "login");
    });

    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.textContent = "";
      submitBtn.disabled = true;

      const email = emailInput.value.trim();
      const password = passInput.value;

      try {
        if (mode === "login") {
          const cred = await signInWithEmailAndPassword(auth, email, password);
          // Candado: si nunca verificó su email, no entra a la app
          if (!cred.user.emailVerified) {
            window.location.href = "verify-email.html";
            return;
          }
          sessionStorage.setItem("focus-entry", "login");
          window.location.href = "index.html";
        } else {
          // SIGN UP: creamos la cuenta, enviamos el enlace de verificación
          // y mandamos al usuario a la página de espera. No entra a la app
          // hasta que pulse el enlace de su correo.
          const cred = await createUserWithEmailAndPassword(auth, email, password);
          await sendEmailVerification(cred.user);
          sessionStorage.setItem("focus-entry", "signup");
          window.location.href = "verify-email.html";
        }
      } catch (err) {
        errorMsg.textContent = translateError(err.code);
        submitBtn.disabled = false;
      }
    });

    // ---- Login con Google ----
    document.getElementById("googleBtn").addEventListener("click", async () => {
      errorMsg.textContent = "";
      try {
        await loginWithGoogle();
        sessionStorage.setItem("focus-entry", "login");
        window.location.href = "index.html";
      } catch (err) {
        if (err.code !== "auth/popup-closed-by-user") {
          console.error(err);
          errorMsg.textContent = "No se pudo iniciar sesión con Google.";
        }
      }
    });

    function translateError(code) {
      switch (code) {
        case "auth/invalid-email": return "El email no es válido.";
        case "auth/user-not-found": return "No existe ninguna cuenta con ese email.";
        case "auth/wrong-password": return "Contraseña incorrecta.";
        case "auth/invalid-credential": return "Email o contraseña incorrectos.";
        case "auth/email-already-in-use": return "Ya existe una cuenta con ese email.";
        case "auth/weak-password": return "La contraseña debe tener al menos 6 caracteres.";
        case "auth/too-many-requests": return "Demasiados intentos. Espera unos minutos.";
        default: return "Algo ha ido mal. Inténtalo de nuevo.";
      }
    }
  </script>

  <!-- PWA: registro del Service Worker -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch((err) => {
          console.warn("No se pudo registrar el Service Worker:", err);
        });
      });
    }
  </script>
</body>
</html>
